<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBFBFA;--bg2:#fff;--bg3:#F7F6F3;
  --border:#EAEAEA;--border2:#DDDBD6;
  --text:#2F3437;--text2:#787774;--text3:#A8A29E;
  --blue:#1F6C9F;--blue-bg:#E1F3FE;
  --green:#346538;--green-bg:#EDF3EC;
  --yellow:#956400;--yellow-bg:#FBF3DB;
  --red:#AF4040;--red-bg:#FCEAEA;
  --purple:#6B4FA0;--purple-bg:#EFEAF7;
  --gold:#C9A24B;--sidebar:#4E565C;
  --font:'Noto Sans TC',-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei',sans-serif;
  --font-serif:'Noto Serif TC',-apple-system,serif;
  --mono:'JetBrains Mono','Courier New',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;min-height:100vh}
/* Sidebar */
#sidebar{width:220px;min-height:100vh;background:var(--sidebar);position:fixed;top:0;left:0;padding:0;z-index:100;display:flex;flex-direction:column;transition:width .18s ease}
.sb-logo{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;position:relative}
.sb-logo img{height:40px;width:auto;display:block}
.sb-titlebox{display:flex;flex-direction:column;align-items:center;gap:2px}
.sb-titlebox .sb-company{font-size:13px;color:var(--gold);font-weight:700;letter-spacing:.1em}
.sb-titlebox .sb-title{font-size:12px;font-weight:500;color:rgba(255,255,255,.7)}
.sb-nav{padding:14px 10px;display:flex;flex-direction:column;gap:3px;flex:1}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer;text-align:left;width:100%;transition:all .15s;font-family:inherit}
.sb-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-btn.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.sb-btn .label-short{display:none;width:100%;text-align:center}
.sb-toggle{position:absolute;top:18px;right:-14px;width:28px;height:28px;border-radius:50%;background:var(--sidebar);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;z-index:101;transition:transform .18s ease}
body.sidebar-collapsed #sidebar{width:64px}
body.sidebar-collapsed #main{margin-left:64px;max-width:calc(100vw - 64px)}
body.sidebar-collapsed #adminBar{left:64px}
body.sidebar-collapsed .sb-titlebox,
body.sidebar-collapsed .sb-btn .label-full{display:none}
body.sidebar-collapsed .sb-btn{justify-content:center;padding:9px 4px}
body.sidebar-collapsed .sb-btn .label-short{display:block}
body.sidebar-collapsed .sb-toggle{transform:rotate(180deg)}
/* Admin bar */
#adminBar{position:fixed;top:0;left:220px;right:0;height:60px;background:#fff;display:flex;align-items:center;justify-content:flex-end;padding:0 24px;gap:12px;z-index:90;font-size:13px;overflow:hidden;box-sizing:border-box;transition:left .18s ease}
#adminBar .ab-label{color:var(--text);margin-right:auto;font-weight:700;font-size:20px;line-height:1;font-family:var(--font-serif)}
.ab-badge{background:var(--green-bg);color:var(--green);border-radius:6px;padding:4px 10px;font-weight:600;font-size:12px}
.ab-btn{border:1px solid var(--border2);background:#fff;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text)}
.ab-btn:hover{background:var(--bg3)}
.ab-login{color:var(--blue);border-color:var(--blue)}
#loginModal,#signModal{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:999;display:flex;align-items:center;justify-content:center}
#loginModal.hidden,#signModal.hidden{display:none}
.sign-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.sign-row label{font-size:12px;color:var(--text2);width:96px;flex-shrink:0}
.lm-box{background:#fff;border-radius:12px;padding:24px;width:280px;display:flex;flex-direction:column;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.lm-title{font-size:16px;font-weight:700;font-family:var(--font-serif)}
.lm-input{border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit}
.lm-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.lm-err{color:var(--red);font-size:12px;min-height:14px}
.lm-cancel{background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;text-decoration:underline;font-family:inherit}
body.readonly .admin-only{display:none!important}
/* Main */
#main{margin-left:220px;flex:1;padding:110px 32px 28px;max-width:calc(100vw - 220px)}
/* Cards */
.card{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:20px 24px;margin-bottom:16px}
.metric-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.metric-card{background:var(--bg2);border-radius:10px;border:1px solid var(--border);padding:16px 20px}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.metric-value{font-size:26px;font-weight:700;font-family:var(--font-serif)}
.metric-unit{font-size:12px;color:var(--text2);margin-top:2px}
.section-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:600;color:var(--text2);font-size:12px;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--bg3);vertical-align:middle}
tr:last-child td{border-bottom:none}
/* Form */
.form-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px}
.form-group{display:flex;flex-direction:column;gap:4px;min-width:90px}
.form-group.flex1{flex:1}
.form-label{font-size:12px;color:var(--text2)}
input,select,textarea{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);background:#fff;font-family:inherit;width:100%}
input:focus,select:focus{outline:2px solid var(--blue);border-color:transparent}
/* Buttons */
.btn{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;border:none;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#185a85}
.btn-danger{background:#fff;color:var(--red);border:1px solid var(--red)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3)}
/* Badge / pill */
.badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}
.pill{display:inline-block;border-radius:9999px;padding:3px 10px;font-size:12px;font-weight:600}
.pill-ok{background:var(--green-bg);color:var(--green)}
.pill-warn{background:var(--yellow-bg);color:var(--yellow)}
.pill-bad{background:var(--red-bg);color:var(--red)}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:8px;border:none;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{background:var(--blue);color:#fff;font-weight:600}
.tab:not(.active){background:transparent;color:var(--text2)}
.tab:not(.active):hover{background:var(--bg3)}
/* Toast */
#toast{position:fixed;top:20px;right:20px;z-index:9999;background:var(--green);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);display:none;max-width:300px}
/* Page header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.page-title{font-size:22px;font-weight:700;font-family:var(--font-serif)}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px}
.header-controls{display:flex;gap:8px;align-items:center}
.empty{color:var(--text2);font-size:13px;padding:24px 0;text-align:center}
.info-box{padding:14px;border-radius:8px;font-size:12px;line-height:1.8}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media (max-width:900px){.metric-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
</style>
</head>

    <button class="lm-btn" onclick="doLogin()">登入</button>

<script>
(function(){
  const PW='demo1234';
  const SK='train_admin';
  let isAdmin=sessionStorage.getItem(SK)==='1';

  function applyAdminState(){
    document.getElementById('adminBadge').style.display=isAdmin?'inline-block':'none';
    document.getElementById('adminLoginBtn').style.display=isAdmin?'none':'inline-block';
    document.getElementById('adminLogoutBtn').style.display=isAdmin?'inline-block':'none';
    if(isAdmin){document.body.classList.remove('readonly');}
    else{document.body.classList.add('readonly');}
  }
  function openLoginModal(){
    document.getElementById('loginModal').classList.remove('hidden');
    document.getElementById('loginErr').textContent='';
    document.getElementById('pwInput').value='';
    setTimeout(()=>document.getElementById('pwInput').focus(),80);
  }
  function closeLoginModal(){
    document.getElementById('loginModal').classList.add('hidden');
  }
  function doLogin(){
    const v=document.getElementById('pwInput').value;
    if(v===PW){
      isAdmin=true;
      sessionStorage.setItem(SK,'1');
      closeLoginModal();
      applyAdminState();
      if(window.renderMain)window.renderMain();
    }else{
      document.getElementById('loginErr').textContent='密碼錯誤，請再試一次';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
    }
  }
  function doLogout(){
    isAdmin=false;
    sessionStorage.removeItem(SK);
    applyAdminState();
    if(window.renderMain)window.renderMain();
  }

  window.doLogin=doLogin;
  window.doLogout=doLogout;
  window.openLoginModal=openLoginModal;
  window.closeLoginModal=closeLoginModal;
  window.isAdmin=function(){return isAdmin;};

  document.getElementById('loginModal').addEventListener('click',function(e){
    if(e.target===this)closeLoginModal();
  });

  applyAdminState();
})();
</script>

<script>
// ═══════════════════════════════════════════════
// 資料

const STAFF_KEY='train_staff', RECORD_KEY='train_records', CERTREQ_KEY='train_certreq', META_KEY='train_meta';

// 法定 / 常見需回訓證照
// 示範企業為「第一類事業單位（非營造業）」，勞工人數180人，落於100~300人區間：

// 因 < 200人，尚未達須建立 OSHMS（職業安全衛生管理系統）之門檻（第一類≥200人）。
const DEFAULT_CERT_TYPES=[

  {id:'osh_b',name:'職業安全衛生業務主管（乙級）',cycle:2,required:1,initHours:35,refreshHours:6,note:'第一類事業100~300人應置乙級業務主管1人，初訓35小時，回訓週期2年6小時'},
  {id:'osh_mgr',name:'職業安全衛生管理員',cycle:2,required:1,initHours:115,refreshHours:12,note:'乙種職業安全管理員，初訓115小時，協助一級管理單位業務，回訓週期2年12小時'},
  {id:'first_aid',name:'急救人員',cycle:3,required:4,initHours:16,refreshHours:0,note:'勞工人數超過50人者，每50人應置1人（180人≈4人），初訓16小時'},
  {id:'fire_mgr',name:'防火管理人',cycle:2,required:1,initHours:12,refreshHours:0,note:'消防法規定一定規模建築物應置防火管理人，初訓12小時，回訓週期2年'},
  {id:'forklift',name:'堆高機操作人員',cycle:3,required:2,initHours:18,refreshHours:3,note:'如有使用堆高機之場域，依使用班次設置，初訓18小時，回訓週期3年3小時'},

  {id:'first_aid_cpr',name:'急救人員CPR+AED複訓',cycle:1,required:4,initHours:4,refreshHours:4,note:'部分縣市消防局建議每年複訓，每次約4小時'},

// 各類證照／訓練之法規對照表（含未預設啟用的項目），供「依法規自動套用」使用
const CERT_CATALOG=[
  {id:'osh_a',name:'職業安全衛生業務主管（甲級）',cycle:2,initHours:42,refreshHours:6},
  {id:'osh_b',name:'職業安全衛生業務主管（乙級）',cycle:2,initHours:35,refreshHours:6},

  {id:'osh_mgr',name:'職業安全衛生管理員（乙級）',cycle:2,initHours:115,refreshHours:12},
  {id:'osh_officer',name:'職業安全衛生管理師（甲級）',cycle:2,initHours:130,refreshHours:12},
  {id:'first_aid',name:'急救人員',cycle:3,initHours:16,refreshHours:0},
  {id:'fire_mgr',name:'防火管理人',cycle:2,initHours:12,refreshHours:0},
  {id:'forklift',name:'堆高機操作人員',cycle:3,initHours:18,refreshHours:3},
  {id:'low_voltage',name:'低壓電工',cycle:3,initHours:90,refreshHours:0},
  {id:'organic_solvent',name:'有機溶劑作業主管',cycle:3,initHours:18,refreshHours:6},

];

// 依「事業單位分類」與「勞工人數」推算法定應置安全衛生人員（依職業安全衛生管理辦法附表簡化版）
function categoryRequiredCerts(category,employees){
  const reqs=[];
  if(category===1){ // 第一類事業（如製造業等高風險）
    if(employees<30) reqs.push({id:'osh_c',required:1,note:'未滿30人，置丙級業務主管1人'});
    else if(employees<100) reqs.push(
      {id:'osh_b',required:1,note:'30~100人，置乙級業務主管1人'},
      {id:'osh_a',required:1,note:'30~100人，置甲級業務主管1人'});
    else if(employees<300) reqs.push(
      {id:'osh_b',required:1,note:'100~300人，置乙級業務主管1人（不須專職），並設一級管理單位'},
      {id:'osh_a',required:1,note:'100~300人，置甲級業務主管1人（不須專職）'});
    else if(employees<500) reqs.push(
      {id:'osh_officer',required:1,note:'300~500人，置甲級安全衛生管理師1人'},
      {id:'osh_b',required:1,note:'300~500人，置乙級業務主管1人'},
      {id:'osh_a',required:1,note:'300~500人，置甲級業務主管1人'});
    else if(employees<1000) reqs.push(
      {id:'osh_b',required:1,note:'500~1000人，置專職乙級業務主管1人，並設專責一級管理單位'},
      {id:'osh_a',required:1,note:'500~1000人，置專職甲級業務主管1人'});
    else reqs.push(
      {id:'osh_officer',required:2,note:'1000人以上，置甲級安全衛生管理師2人'},
      {id:'osh_b',required:2,note:'1000人以上，置乙級業務主管2人'},
      {id:'osh_a',required:1,note:'1000人以上，置甲級業務主管1人'});
  }else if(category===2){ // 第二類事業（中等風險，如一般製造/批發等）
    if(employees<100) reqs.push({id:'osh_c',required:1,note:'未滿100人，置丙級業務主管1人'});
    else if(employees<300) reqs.push({id:'osh_b',required:1,note:'100~300人，置乙級業務主管1人'});
    else if(employees<500) reqs.push(
      {id:'osh_b',required:1,note:'300~500人，置乙級業務主管1人'},
      {id:'osh_a',required:1,note:'300~500人，置甲級業務主管1人'});
    else reqs.push(
      {id:'osh_officer',required:1,note:'500人以上，置甲級安全衛生管理師1人'},
      {id:'osh_b',required:1,note:'500人以上，置乙級業務主管1人'},
      {id:'osh_a',required:1,note:'500人以上，置甲級業務主管1人'});
  }else{ // 第三類事業（低風險，如金融保險、辦公室服務業）
    if(employees<300) reqs.push({id:'osh_c',required:1,note:'未滿300人，置丙級業務主管1人'});
    else if(employees<1000) reqs.push({id:'osh_b',required:1,note:'300~1000人，置乙級業務主管1人'});
    else reqs.push(
      {id:'osh_b',required:1,note:'1000人以上，置乙級業務主管1人'},
      {id:'osh_a',required:1,note:'1000人以上，置甲級業務主管1人'});
  }
  if(employees>=50) reqs.push({id:'first_aid',required:Math.ceil(employees/50),note:'勞工人數每50人應置急救人員1人（依現有人數推算）'});
  reqs.push({id:'general_edu',required:0,note:'全體勞工均應接受一般安全衛生教育訓練（依職類調整時數）'});
  return reqs;
}

function loadJSON(key,fallback){
  try{const s=localStorage.getItem(key);return s?JSON.parse(s):JSON.parse(JSON.stringify(fallback));}
  catch(e){return JSON.parse(JSON.stringify(fallback));}
}

function esc(s){return String(s!==null&&s!==undefined?s:'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function todayISO(){return new Date().toISOString().slice(0,10);}
function addYears(iso,years){
  if(!iso)return'';
  const d=new Date(iso);
  d.setFullYear(d.getFullYear()+Number(years||0));
  return d.toISOString().slice(0,10);
}
function daysUntil(iso){
  if(!iso)return null;
  const d=new Date(iso+'T00:00:00'),now=new Date();now.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}
function nextDue(r){
  const base=r.lastRefresh||r.certDate;
  return addYears(base,r.cycle);
}
function statusOf(r){
  const due=nextDue(r);
  const d=daysUntil(due);
  if(d===null)return{label:'未設定',cls:'pill-warn',due};
  if(d<0)return{label:'已過期 '+Math.abs(d)+' 天',cls:'pill-bad',due};
  if(d<=90)return{label:'即將到期（剩 '+d+' 天）',cls:'pill-warn',due};
  return{label:'正常',cls:'pill-ok',due};
}
function certName(r){
  const c=CERTS.find(c=>c.id===r.certId);
  return c?c.name:(r.certName||'未分類');
}
function staffName(id){const s=STAFF.find(x=>x.id===id);return s?s:{name:'(未知)',no:'',div:'',dept:'',title:''};}
function toast(msg,type){
  if(type===undefined)type='success';
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=type==='success'?'var(--green)':'var(--red)';
  el.style.display='block';
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>{el.style.display='none';},2800);
}

// 依目前「事業單位類別」與「公司總人數」自動套用法定證照需求
// （將推算結果寫入 CERTS：若項目已存在則更新所需人數／備註，若不存在則自 CERT_CATALOG 新增）
function applyCategoryRules(){
  const reqs=categoryRequiredCerts(META.category||1,META.totalEmployees||0);
  reqs.forEach(req=>{
    let c=CERTS.find(x=>x.id===req.id);
    const cat=CERT_CATALOG.find(x=>x.id===req.id);
    if(!c){
      if(!cat)return;
      c={id:cat.id,name:cat.name,cycle:cat.cycle,initHours:cat.initHours,refreshHours:cat.refreshHours,required:0,note:''};
      CERTS.push(c);
    }
    c.required=req.required;
    c.note=req.note;
    if((c.cycle===undefined||c.cycle===null)&&cat)c.cycle=cat.cycle;
    if((c.initHours===undefined||c.initHours===null)&&cat)c.initHours=cat.initHours;
    if((c.refreshHours===undefined||c.refreshHours===null)&&cat)c.refreshHours=cat.refreshHours;
  });
  saveAll();toast('已依「'+(CATEGORY_LABELS[META.category]||'')+'」與公司總人數（'+META.totalEmployees+'人）自動套用證照需求建議');renderMain();
}

function syncCertCycle(){
  const sel=document.getElementById('nr-cert');
  const opt=sel.options[sel.selectedIndex];
  const cycle=opt.getAttribute('data-cycle');
  const hours=opt.getAttribute('data-hours');
  if(cycle)document.getElementById('nr-cycle').value=cycle;
  if(hours!==null)document.getElementById('nr-hours').value=hours;
}
function addRecord(){
  const staffId=document.getElementById('nr-staff').value;
  const certId=document.getElementById('nr-cert').value;
  const customName=document.getElementById('nr-customname').value.trim();
  const certDate=document.getElementById('nr-certdate').value;
  const lastRefresh=document.getElementById('nr-lastrefresh').value;
  const cycle=+document.getElementById('nr-cycle').value||3;
  const hours=+document.getElementById('nr-hours').value||0;
  if(!staffId||!certDate){toast('請選擇人員並填取證日期','error');return;}
  if(!certId&&!customName){toast('請選擇證照項目或填寫自訂名稱','error');return;}
  RECORDS.push({id:'r_'+Date.now(),staffId,certId:certId||null,certName:certId?'':customName,certDate,hours,lastRefresh:lastRefresh||certDate,cycle});
  saveAll();toast('已新增紀錄');pageRecords();
}
function refreshRecord(id){
  const r=RECORDS.find(x=>x.id===id);if(!r)return;
  const d=prompt('請輸入本次回訓日期 (YYYY-MM-DD)：',todayISO());
  if(!d)return;
  r.lastRefresh=d;
  saveAll();toast('已登記回訓，下次回訓日已更新');pageRecords();
}
function delRecord(id){
  RECORDS=RECORDS.filter(r=>r.id!==id);
  saveAll();toast('已刪除','info');pageRecords();
}
function startRecordEdit(id){editingRecordId=id;pageRecords();}
function cancelRecordEdit(){editingRecordId=null;pageRecords();}
function syncEditCertCycle(){
  const sel=document.getElementById('er-cert');
  const opt=sel.options[sel.selectedIndex];
  const cycle=opt.getAttribute('data-cycle');
  const hours=opt.getAttribute('data-hours');
  if(cycle)document.getElementById('er-cycle').value=cycle;
  if(hours!==null)document.getElementById('er-hours').value=hours;
}
function saveRecordEdit(id){
  const r=RECORDS.find(x=>x.id===id);if(!r)return;
  const staffId=document.getElementById('er-staff').value;
  const certId=document.getElementById('er-cert').value;
  const customNameEl=document.getElementById('er-customname');
  const customName=customNameEl?customNameEl.value.trim():'';
  const certDate=document.getElementById('er-certdate').value;
  const lastRefresh=document.getElementById('er-lastrefresh').value;
  const cycle=+document.getElementById('er-cycle').value||0;
  const hours=+document.getElementById('er-hours').value||0;
  if(!staffId){toast('請選擇人員','error');return;}
  if(!certDate){toast('請填取證日期','error');return;}
  if(!certId&&!customName){toast('請選擇證照項目或填寫自訂名稱','error');return;}
  r.staffId=staffId;
  r.certId=certId||null;
  r.certName=certId?'':customName;
  r.certDate=certDate;
  r.lastRefresh=lastRefresh||certDate;
  r.cycle=cycle;
  r.hours=hours;
  editingRecordId=null;
  saveAll();toast('已更新紀錄');pageRecords();
}

// ── 簽核 / 附件 ──
let signTargetId=null;
function openSignModal(id){
  signTargetId=id;
  const r=RECORDS.find(x=>x.id===id);if(!r)return;
  const sigs=r.signatures||{};
  document.getElementById('signFields').innerHTML=SIGN_ROLES.map(role=>{
    const sg=sigs[role]||{};
    return`<div class="sign-row"><label>${esc(role)}</label>
      <input data-role="${esc(role)}" class="sign-name" placeholder="簽名／姓名" value="${esc(sg.name||'')}" style="flex:1">
      <input data-role="${esc(role)}" type="date" class="sign-date" value="${esc(sg.date||'')}" style="width:130px"></div>`;
  }).join('');
  document.getElementById('sign-current').textContent=r.attachment?('目前附件：'+r.attachment.name):'目前無附件';
  document.getElementById('sign-file').value='';
  document.getElementById('signModal').classList.remove('hidden');
}
function closeSignModal(){
  document.getElementById('signModal').classList.add('hidden');
  signTargetId=null;
}
function saveSign(){
  const r=RECORDS.find(x=>x.id===signTargetId);if(!r)return;
  const sigs={};
  document.querySelectorAll('#signFields .sign-row').forEach(row=>{
    const role=row.querySelector('.sign-name').getAttribute('data-role');
    const name=row.querySelector('.sign-name').value.trim();
    let date=row.querySelector('.sign-date').value;
    if(name&&!date)date=todayISO();
    if(name)sigs[role]={name,date};
  });
  r.signatures=sigs;
  const file=document.getElementById('sign-file').files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=function(e){
      r.attachment={name:file.name,dataUrl:e.target.result};
      saveAll();toast('已儲存簽核與附件');closeSignModal();pageRecords();
    };
    reader.readAsDataURL(file);
  }else{
    saveAll();toast('已儲存簽核');closeSignModal();pageRecords();
  }
}
document.addEventListener('click',function(e){
  const m=document.getElementById('signModal');
  if(m&&e.target===m)closeSignModal();
});

// ── CSV 匯出 ──
function exportRecordsCSV(){
  const head=['姓名','工號','處室','部門','職稱','證照／訓練項目','訓練時數','取證日期','回訓週期(年)','上次回訓日','下次回訓日','狀態',
    ...SIGN_ROLES.map(r=>r+'簽名'),...SIGN_ROLES.map(r=>r+'簽核日期'),'附件檔名'];
  const lines=[head.map(csvField).join(',')];
  RECORDS.forEach(r=>{
    const s=staffName(r.staffId);
    const st=statusOf(r);
    const sigs=r.signatures||{};
    const row=[s.name,s.no,s.div,s.dept,s.title,certName(r),r.hours||0,r.certDate||'',r.cycle,r.lastRefresh||r.certDate||'',st.due||'',st.label,
      ...SIGN_ROLES.map(role=>(sigs[role]&&sigs[role].name)||''),
      ...SIGN_ROLES.map(role=>(sigs[role]&&sigs[role].date)||''),
      (r.attachment&&r.attachment.name)||''];
    lines.push(row.map(csvField).join(','));
  });
  const csv='﻿'+lines.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='教育訓練證照紀錄_'+todayISO()+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
