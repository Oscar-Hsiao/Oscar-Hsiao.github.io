    <button class="lm-btn" onclick="doLogin()">登入</button>

    <br><button class="lm-cancel" onclick="closeLoginModal()">取消</button>
  </div>

<script>
(function(){
  const ADMIN_HASH='0ead2060b65992dca4769af601a1b3a35ef38cfad2c2c465bb160ea764157c5d'; // SHA-256 of demo1234, avoid storing plaintext in source
  async function sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
  const SK='ghg_admin';
  let isAdmin=sessionStorage.getItem(SK)==='1';

  function applyAdminState(){
    document.getElementById('adminBadge').style.display=isAdmin?'inline-block':'none';
    document.getElementById('adminLoginBtn').style.display=isAdmin?'none':'inline-block';
    document.getElementById('adminLogoutBtn').style.display=isAdmin?'inline-block':'none';
    if(isAdmin){document.body.classList.remove('readonly');}
    else{document.body.classList.add('readonly');}
  }

  function openLoginModal(){
    document.getElementById('loginModal').classList.remove('hidden');
    document.getElementById('loginErr').textContent='';
    document.getElementById('pwInput').value='';
    setTimeout(()=>document.getElementById('pwInput').focus(),80);
  }
  function closeLoginModal(){
    document.getElementById('loginModal').classList.add('hidden');
  }
  async function doLogin(){
    const v=document.getElementById('pwInput').value;
    const hash=await sha256(v);
    if(hash===ADMIN_HASH){
      isAdmin=true;
      sessionStorage.setItem(SK,'1');
      closeLoginModal();
      applyAdminState();
      if(window.renderMain)window.renderMain();
    }else{
      document.getElementById('loginErr').textContent='密碼錯誤，請再試一次';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
    }
  }
  function doLogout(){
    isAdmin=false;
    sessionStorage.removeItem(SK);
    applyAdminState();
    if(window.renderMain)window.renderMain();
  }

  window.doLogin=doLogin;
  window.doLogout=doLogout;
  window.openLoginModal=openLoginModal;
  window.closeLoginModal=closeLoginModal;
  window.isAdmin=function(){return isAdmin;};

  // 點 Modal 背景關閉
  document.getElementById('loginModal').addEventListener('click',function(e){
    if(e.target===this)closeLoginModal();
  });

  applyAdminState();
})();
</script>

const DEMO={records:{"2025":{"1":{"electricity":[{"id":"xl_e_1","site":"汐止","meter":"2935001313","kwh":1073.0,"amount":2678.0,"startDate":"2024-11-15","endDate":"2025-01-13","emission":null}],"refrigerant":[],"fuel":[],"septicTank":[]}}}};
function loadRec(){try{const s=localStorage.getItem(REC_KEY);return s?JSON.parse(s):JSON.parse(JSON.stringify(DEMO.records));}catch(e){return JSON.parse(JSON.stringify(DEMO.records));}}
function loadCoeff(){
  try{
    const s=localStorage.getItem(COEFF_KEY);
    const c=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_COEFF));
    if(!c.meta)c.meta=JSON.parse(JSON.stringify(DEFAULT_COEFF.meta));
    return c;
  }catch(e){return JSON.parse(JSON.stringify(DEFAULT_COEFF));}
}
function saveRec(r){try{localStorage.setItem(REC_KEY,JSON.stringify(r));}catch(e){}}
function saveCoeff(c){try{localStorage.setItem(COEFF_KEY,JSON.stringify(c));}catch(e){}}

let REC=loadRec(), COEFF=loadCoeff();
let currentTab='dashboard', currentYear=2025, currentMonth=1, currentSite='all';

function getElecFactorInfo(year){return COEFF.electricity.find(e=>e.year===year)||COEFF.electricity[0];}
function getElecFactor(year){return getElecFactorInfo(year).factor;}
function coeffVersionLabel(type,year){
  if(type==='electricity'){const f=getElecFactorInfo(year);return`${f.note||'台電公告'}（${f.year}年版，${f.factor} kgCO₂e/度）`;}
  const m=COEFF.meta&&COEFF.meta[type];
  if(!m)return'';
  return`${m.version}（更新日：${m.updatedAt}）`;
}
function calcElec(kwh,year){return+(kwh*getElecFactor(year)/1000).toFixed(6);}
function calcRefrig(kg,leakRate,gwp){if(!gwp)return null;return+(kg*gwp*leakRate/1000).toFixed(6);}
function calcFuel(amount,price){if(!price||price<=0)return 0;const f=COEFF.fuel.gasoline92,L=amount/price;return+((L*f.co2+L*f.ch4*f.gwp_ch4+L*f.n2o*f.gwp_n2o)/1000).toFixed(6);}
function calcSeptic(male,female,workDays,hoursPerDay){const cfg=COEFF.septicTank,ph=(male+female)*hoursPerDay*workDays,act=(ph/cfg.daily_hours)*cfg.bod_per_person_day;return+(act*cfg.bo*cfg.mcf*cfg.gwp_ch4).toFixed(6);}

function recalcYear(year){
  const yr=String(year);
  if(!REC[yr])return;
  Object.keys(REC[yr]).forEach(mo=>{
    const m=REC[yr][mo];
    (m.electricity||[]).forEach(r=>{r.emission=calcElec(r.kwh,year);});
    (m.refrigerant||[]).forEach(r=>{r.emission=calcRefrig(r.kg,r.leakRate,r.gwp);});
    (m.fuel||[]).forEach(r=>{r.emission=calcFuel(r.amount,r.pricePerLiter);});
    (m.septicTank||[]).forEach(r=>{r.emission=calcSeptic(r.male,r.female,r.workDays,r.hoursPerDay);});
  });
}
recalcYear(currentYear);

  if(site===undefined)site='all';
  const yr=String(year);
  const empty=Array.from({length:12},(_,i)=>({month:i+1,cat1:0,cat2:0,refrigerant:0,fuel:0,septic:0}));
  if(!REC[yr])return{months:empty,total:{cat1:0,cat2:0}};
  const months=[];
  for(let m=1;m<=12;m++){
    const md=REC[yr][String(m)];
    if(!md){months.push({month:m,cat1:0,cat2:0,refrigerant:0,fuel:0,septic:0});continue;}
    const fs=r=>site==='all'||r.site===site;
    const cat2=(md.electricity||[]).filter(fs).reduce((s,r)=>s+(r.emission||0),0);
    const refrigerant=(md.refrigerant||[]).filter(fs).reduce((s,r)=>s+(r.emission||0),0);
    const fuel=(md.fuel||[]).filter(fs).reduce((s,r)=>s+(r.emission||0),0);
    const septic=(md.septicTank||[]).filter(fs).reduce((s,r)=>s+(r.emission||0),0);
    months.push({month:m,cat2,refrigerant,fuel,septic,cat1:refrigerant+fuel+septic});
  }
  const total=months.reduce((a,m)=>({cat1:a.cat1+m.cat1,cat2:a.cat2+m.cat2}),{cat1:0,cat2:0});
  return{months,total};
}
function getBreakdown(year){
  const yr=String(year);
  if(!REC[yr])return[];
  return['汐止','南港'].map(site=>{
    let cat1=0,cat2=0;
    Object.values(REC[yr]).forEach(md=>{
      cat2+=(md.electricity||[]).filter(r=>r.site===site).reduce((s,r)=>s+(r.emission||0),0);
      var _c1arr=(md.refrigerant||[]).concat(md.fuel||[]).concat(md.septicTank||[]).filter(function(r){return r.site===site;}); cat1+=_c1arr.reduce(function(s,r){return s+(r.emission||0);},0);
    });
    return{site,cat1:+cat1.toFixed(4),cat2:+cat2.toFixed(4),total:+(cat1+cat2).toFixed(4)};
  });
}

function drawBarChart(canvasId,data){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const pad={top:20,right:10,bottom:30,left:48};
  const chartW=W-pad.left-pad.right,chartH=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);

  var _vals=data.map(function(d){return d.cat1+d.cat2;}); _vals.push(0.001); var maxVal=Math.max.apply(null,_vals);
  const barW=chartW/data.length;

  // Grid
  ctx.strokeStyle='#f0f0f0';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.top+chartH*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+chartW,y);ctx.stroke();
    ctx.fillStyle='#787774';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(fmt(maxVal*i/4,3),pad.left-4,y+3);
  }

  data.forEach((d,i)=>{
    const x=pad.left+i*barW+barW*0.1;
    const bw=barW*0.8;
    const h1=d.cat1/maxVal*chartH;
    const h2=d.cat2/maxVal*chartH;

    // cat1 (bottom)
    if(h1>0){ctx.fillStyle='#346538';ctx.fillRect(x,pad.top+chartH-h1,bw,h1);}
    // cat2 (top)
    if(h2>0){ctx.fillStyle='#1F6C9F';ctx.fillRect(x,pad.top+chartH-h1-h2,bw,h2);}

    // x label
    ctx.fillStyle='#787774';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.name,pad.left+i*barW+barW/2,H-8);
  });

  // Legend
  [['類別一',`#346538`],['類別二','#1F6C9F']].forEach(([name,color],i)=>{
    ctx.fillStyle=color;ctx.fillRect(W-120+i*58,6,12,10);
    ctx.fillStyle='#787774';ctx.font='10px sans-serif';ctx.textAlign='left';
    ctx.fillText(name,W-106+i*58,15);
  });
}

function drawPieChart(canvasId,data){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total<=0){ctx.fillStyle='#787774';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('尚無資料',W/2,H/2);return;}

  const cx=W/2-30,cy=H/2,r=Math.min(cx,cy)-20;
  let startAngle=-Math.PI/2;
  data.forEach(d=>{
    const slice=d.value/total*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,startAngle,startAngle+slice);
    ctx.closePath();ctx.fillStyle=d.color;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    startAngle+=slice;
  });

  // Legend
  const lx=W-90,ly=H/2-data.length*12;
  data.forEach((d,i)=>{
    ctx.fillStyle=d.color;ctx.fillRect(lx,ly+i*22,12,12);
    ctx.fillStyle='#2F3437';ctx.font='11px sans-serif';ctx.textAlign='left';
    ctx.fillText(d.name,lx+16,ly+i*22+10);
    ctx.fillStyle='#787774';
    ctx.fillText(`${(d.value/total*100).toFixed(0)}%`,lx+16,ly+i*22+21);
  });
}

function roundedRect(ctx,x,y,w,h,r){
  if(w<2*r)r=w/2;if(h<2*r)r=h/2;
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawCatBar(canvasId,data){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  var pad={top:20,right:20,bottom:50,left:60};
  var cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
  var maxVal=Math.max.apply(null,data.map(function(d){return d.value;}));
  if(maxVal<=0)maxVal=1;
  var bw=cW/data.length;
  for(var i=0;i<=4;i++){
    var y=pad.top+cH*(1-i/4);
    ctx.strokeStyle='#f0f0f0';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cW,y);ctx.stroke();
    ctx.fillStyle='#787774';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText((maxVal*i/4).toFixed(0),pad.left-6,y+3);
  }
  data.forEach(function(d,i){
    var h=Math.max(d.value/maxVal*cH,2);
    var x=pad.left+i*bw+bw*0.15;
    var bwidth=bw*0.7;
    ctx.fillStyle=d.color;
    roundedRect(ctx,x,pad.top+cH-h,bwidth,h,4);
    ctx.fill();
    ctx.fillStyle='#2F3437';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.value.toFixed(1),x+bwidth/2,pad.top+cH-h-6);
    var lines=d.name.split('\n');
    lines.forEach(function(line,li){
      ctx.fillStyle='#787774';ctx.font='10px sans-serif';
      ctx.fillText(line,pad.left+i*bw+bw/2,H-pad.bottom+15+li*13);
    });
  });
}
function drawYoYChart(canvasId,groups){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  var pad={top:24,right:20,bottom:46,left:60};
  var cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
  var maxVal=Math.max.apply(null,groups.map(function(g){return Math.max(g.last,g.curr);}).concat([0.001]));
  var gw=cW/groups.length;
  for(var i=0;i<=4;i++){
    var y=pad.top+cH*(1-i/4);
    ctx.strokeStyle='#f0f0f0';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cW,y);ctx.stroke();
    ctx.fillStyle='#787774';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText((maxVal*i/4).toFixed(0),pad.left-6,y+3);
  }
  groups.forEach(function(g,i){
    var bw=gw*0.28;
    var x0=pad.left+i*gw+gw*0.18;
    var hLast=Math.max(g.last/maxVal*cH,0);
    var hCurr=Math.max(g.curr/maxVal*cH,0);
    ctx.fillStyle='#A8A29E';
    roundedRect(ctx,x0,pad.top+cH-hLast,bw,hLast,3);ctx.fill();
    ctx.fillStyle=g.color;
    roundedRect(ctx,x0+bw+6,pad.top+cH-hCurr,bw,hCurr,3);ctx.fill();
    ctx.fillStyle='#2F3437';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText(g.last.toFixed(1),x0+bw/2,pad.top+cH-hLast-6);
    ctx.fillText(g.curr.toFixed(1),x0+bw+6+bw/2,pad.top+cH-hCurr-6);
    ctx.fillStyle='#787774';ctx.font='10px sans-serif';
    ctx.fillText(g.name,x0+bw+3,H-pad.bottom+15);
    var pct=g.last>0?((g.curr-g.last)/g.last*100):0;
    var pctTxt=(pct>=0?'+':'')+pct.toFixed(1)+'%';
    ctx.fillStyle=pct>0?'#AF4040':'#346538';
    ctx.fillText(pctTxt,x0+bw+3,H-pad.bottom+28);
  });
  // Legend
  ctx.fillStyle='#A8A29E';ctx.fillRect(pad.left,4,12,10);
  ctx.fillStyle='#787774';ctx.font='10px sans-serif';ctx.textAlign='left';
  ctx.fillText('去年',pad.left+16,13);
  ctx.fillStyle='#346538';ctx.fillRect(pad.left+60,4,12,10);
  ctx.fillStyle='#787774';
  ctx.fillText('今年',pad.left+76,13);
}

function drawCatPie(canvasId,data){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total<=0){ctx.fillStyle='#787774';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('尚無資料',W/2,H/2);return;}
  const cx=110,cy=H/2,r=Math.min(cx,cy)-15;
  let angle=-Math.PI/2;
  data.forEach(d=>{
    const slice=d.value/total*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath();ctx.fillStyle=d.color;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    angle+=slice;
  });
  // Legend
  const lx=225,ly=H/2-data.length*14;
  data.forEach((d,i)=>{
    ctx.fillStyle=d.color;ctx.fillRect(lx,ly+i*26,12,12);
    const label=d.name.replace('\n','');
    ctx.fillStyle='#2F3437';ctx.font='11px sans-serif';ctx.textAlign='left';
    ctx.fillText(label,lx+16,ly+i*26+10);
    ctx.fillStyle='#787774';ctx.font='10px sans-serif';
    ctx.fillText((d.value/total*100).toFixed(1)+'%  '+d.value.toFixed(1)+' 公噸',lx+16,ly+i*26+21);
  });
}

          </div>`).join('')}
      </div></div>
      ${coeffVersionBox('fuel')}`;
  }
  else{
    const cfg=COEFF.septicTank;
    const fields=[['bo','Bo（BOD 最大 CH₄ 產生能力）'],['mcf','MCF（CH₄ 修正係數）'],['gwp_ch4','CH₄ GWP 值 (AR6)'],['bod_per_person_day','每人每日 BOD（公噸）'],['daily_hours','每日工時（小時）']];

          <div>
            <div class="form-label" style="margin-bottom:6px">${label}</div>

          </div>`).join('')}
      </div>
      <div class="info-box">
        <strong>計算公式：</strong>人時 = 總人數 × 每日工時 × 工作天數<br>

      </div>
    </div>
    ${coeffVersionBox('septicTank')}`;
  }
}

function exportCSV(){
  const year=currentYear;
  const S=ANNUAL_SUMMARY[String(year)];
  if(!S){toast('無資料可匯出','error');return;}
  const tw=S.TW,xm=S.XM;
  const rows=[
    ['排放類別','GHG Protocol 範疇','台灣廠(公噸CO₂e)','廈門廠(公噸CO₂e)','合計(公噸CO₂e)','占比(%)'],
  ];
  const grand=tw.cat1.total+tw.cat2.total+tw.cat3.total+tw.cat4.total+xm.cat1.total+xm.cat2.total+xm.cat3.total+xm.cat4.total;
  [['類別一 直接排放','cat1','Scope 1'],['類別二 外購電力','cat2','Scope 2'],['類別三 員工通勤','cat3','Scope 3'],['類別四 間接排放','cat4','Scope 3']].forEach(([label,key,scope])=>{
    const t=+(tw[key].total+xm[key].total).toFixed(4);
    rows.push([label,scope,tw[key].total.toFixed(4),xm[key].total.toFixed(4),t.toFixed(4),(t/grand*100).toFixed(2)+'%']);
  });
  rows.push(['合計','',
    (tw.cat1.total+tw.cat2.total+tw.cat3.total+tw.cat4.total).toFixed(4),
    (xm.cat1.total+xm.cat2.total+xm.cat3.total+xm.cat4.total).toFixed(4),
    grand.toFixed(4),'100%']);
  var csv='\uFEFF'+rows.map(function(r){return r.join(',');}).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`GHG_${year}_盤查彙整表.csv`;a.click();
  toast('CSV 已下載');
}

function ensurePath(yr,mo){
  if(!REC[yr])REC[yr]={};
  if(!REC[yr][mo])REC[yr][mo]={electricity:[],refrigerant:[],fuel:[],septicTank:[]};
}

// Elec
function toggleImportBox(){const b=document.getElementById('importBox');if(b)b.style.display=b.style.display==='none'?'block':'none';}
function addElec(){
  const meter=( document.getElementById('ef-meter') ? document.getElementById('ef-meter').value.trim() : '' );
  const kwh=parseFloat(( document.getElementById('ef-kwh') ? document.getElementById('ef-kwh').value : '' ));
  if(!meter||!kwh)return;
  const yr=String(currentYear),mo=String(currentMonth);
  ensurePath(yr,mo);
  REC[yr][mo].electricity.push({
    id:Date.now().toString(),
    site:document.getElementById('ef-site').value,
    meter,kwh,
    amount:parseFloat(( document.getElementById('ef-amt') ? document.getElementById('ef-amt').value : '' ))||0,
    startDate:( document.getElementById('ef-s') ? document.getElementById('ef-s').value : '' )||'',
    endDate:( document.getElementById('ef-e') ? document.getElementById('ef-e').value : '' )||'',
    emission:calcElec(kwh,currentYear),coeffVersion:coeffVersionLabel('electricity',currentYear)
  });
  saveRec(REC);toast('已新增電力紀錄');pageElec();
}
function delElec(id){
  const yr=String(currentYear),mo=String(currentMonth);
  if(( REC[yr] && REC[yr][mo] ? REC[yr][mo].electricity : null ))REC[yr][mo].electricity=REC[yr][mo].electricity.filter(r=>r.id!==id);
  saveRec(REC);toast('已刪除','info');pageElec();

// Excel import
function handleXlsxFile(input){
  const file=input.files[0];if(!file)return;
  const status=document.getElementById('import-status');
  if(status)status.textContent='解析中⋯';
  if(typeof XLSX==='undefined'){
    if(status)status.innerHTML='<span style="color:#AF4040">⚠️ 請連接網路後重新開啟，XLSX 解析套件需要網路載入一次</span>';
    return;
  }
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      if(importFileType==='elec')parseElecXlsx(wb);
      else parseCat1Xlsx(wb);
    }catch(err){
      if(status)status.innerHTML=`<span style="color:#AF4040">⚠️ 解析失敗：${esc(err.message)}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}
function excelDateToISO(serial){
  if(!serial||isNaN(serial))return'';
  return new Date((serial-25569)*86400*1000).toISOString().slice(0,10);
}
function inferSite(name){
  const s=String(name||'');
  if(s.includes('南港'))return'南港';
  return'汐止';
}
function dateToMonth(iso){return iso&&iso.length>=7?parseInt(iso.slice(5,7)):null;}

function parseElecXlsx(wb){
  const rows=[];
  const skip=['表單使用說明','說明','使用說明'];
  wb.SheetNames.forEach(name=>{
    if(skip.some(s=>name.includes(s)))return;
    const data=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,defval:null});
    const site=inferSite(name);
    data.forEach((row,ri)=>{
      if(!row||!row[0])return;
      const meter=String(row[0]).trim();
      if(!/^\d{8,}/.test(meter))return;
      const kwh=parseFloat(row[5]);
      if(!kwh||isNaN(kwh)||kwh<=0)return;
      const startDate=excelDateToISO(row[2]),endDate=excelDateToISO(row[3]);
      rows.push({id:`imp_e_${Date.now()}_${ri}`,site,meter,kwh,amount:parseFloat(row[6])||0,startDate,endDate,month:dateToMonth(startDate)||1,emission:null});
    });
  });
  if(!rows.length){document.getElementById('import-status').innerHTML='<span style="color:#AF4040">⚠️ 未找到有效電力帳單資料</span>';return;}
  importPreview={type:'elec',rows};
  renderImportStep('preview');
}
function parseCat1Xlsx(wb){
  const result={refrigerant:[],fuel:[],septic:[]};
  wb.SheetNames.forEach(name=>{
    const data=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,defval:null});
    if(name.includes('冷媒')){
      data.forEach((row,ri)=>{
        if(!row||ri===0)return;
        const site=String(row[0]||'').trim();
        if(!['汐止','南港','林口'].includes(site))return;
        const kg=parseFloat(row[5]);if(isNaN(kg)||kg<=0)return;
        result.refrigerant.push({id:`imp_r_${Date.now()}_${ri}`,site,device:String(row[2]||''),substance:String(row[4]||''),kg,gwp:row[8]==='未公告'||!row[8]?null:parseFloat(row[8]),leakRate:parseFloat(row[9])||0.003,emission:null});
      });
    }
    if(name.includes('移動源')){
      data.forEach((row,ri)=>{
        if(!row||ri===0)return;
        const vehicle=String(row[0]||'').trim();
        if(!vehicle||vehicle.includes('排放源'))return;
        const amount=parseFloat(row[3]);if(isNaN(amount)||amount<=0)return;
        result.fuel.push({id:`imp_f_${Date.now()}_${ri}`,site:'南港',vehicle,fuelType:String(row[1]||'車用汽油(92)'),amount,pricePerLiter:parseFloat(row[4])||0,month:dateToMonth(excelDateToISO(row[2]))||1,emission:null});
      });
    }
    if(name.includes('化糞池碳排')){
      let currentSite='汐止';
      data.forEach((row,ri)=>{
        if(!row)return;
        if(row[0]==='汐止'||row[0]==='南港')currentSite=row[0];
        const month=parseInt(row[1]),workDays=parseInt(row[2]);
        if(!month||isNaN(workDays)||workDays<=0)return;
        const male=parseInt(row[4])||0,female=parseInt(row[5])||0;
        if(!male&&!female)return;
        result.septic.push({id:`imp_s_${Date.now()}_${ri}`,site:currentSite,month,workDays,hoursPerDay:parseInt(row[3])||8,male,female,emission:null});
      });
    }
  });
  if(!result.refrigerant.length&&!result.fuel.length&&!result.septic.length){
    document.getElementById('import-status').innerHTML='<span style="color:#AF4040">⚠️ 未找到有效資料，請確認是類別一直接排放檔案</span>';return;
  }
  importPreview=Object.assign({type:'cat1'},result);
  renderImportStep('preview');
}
function commitImport(){
  if(!importPreview)return;
  const yr=String(importYear);
  if(!REC[yr])REC[yr]={};
  const ensure=m=>{const ms=String(m);if(!REC[yr][ms])REC[yr][ms]={electricity:[],refrigerant:[],fuel:[],septicTank:[]};};
  if(importPreview.type==='elec'){
    importPreview.rows.forEach(r=>{ensure(r.month);var _er=Object.assign({},r,{emission:calcElec(r.kwh,importYear)}); REC[yr][String(r.month)].electricity.push(_er);});
  }else{
    importPreview.refrigerant.forEach(r=>{ensure(1);REC[yr]['1'].refrigerant.push(r);});
    importPreview.fuel.forEach(r=>{ensure(r.month);REC[yr][String(r.month)].fuel.push(r);});
    importPreview.septic.forEach(r=>{ensure(r.month);REC[yr][String(r.month)].septicTank.push(r);});
  }
  saveRec(REC);toast('✅ 資料已成功匯入');renderImportStep('done');
}

// ── 拖曳上傳 ──
function handleDrop(e){
  e.preventDefault();
  document.getElementById('dropZone').style.borderColor='#EAEAEA';
  handleFiles(e.dataTransfer.files);
}

// ── 處理檔案 ──
async function handleFiles(files){
  if(!files||!files.length)return;
  const key=localStorage.getItem('ghg_api_key')||'';
  if(!key){alert('請先填入 Anthropic API Key');return;}
  const billType=( document.getElementById('scanBillType') ? document.getElementById('scanBillType').value : 'auto' )||'auto';

  for(const file of Array.from(files)){
    const id='bill_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const bill={id,fileName:file.name,status:'parsing',imageBase64:null,parsed:null,createdAt:new Date().toLocaleString('zh-TW')};
    BILLS.unshift(bill);saveBills(BILLS);renderBillList();

    try{
      // 轉 base64
      const b64=await fileToBase64(file);
      bill.imageBase64=b64;

      // 呼叫 Claude API
      const result=await callClaudeVision(b64, file.type, billType, key);
      bill.parsed=result;
      bill.status='pending';
    }catch(err){
      bill.status='error';
      bill.errorMsg=err.message;
    }
    saveBills(BILLS);renderBillList();
  }
}

async function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    // PDF：只能當 image/jpeg 傳（先 canvas 渲染），簡化處理：直接傳 base64
    const reader=new FileReader();
    reader.onload=e=>{
      const result=e.target.result; // data:image/...;base64,...
      resolve(result); // 保留完整 data URI
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function callClaudeVision(dataUri, mimeType, billType, apiKey){
  // 從 data URI 拆出 base64 部分和 mediaType
  const match=dataUri.match(/^data:([^;]+);base64,(.+)$/);
  if(!match)throw new Error('無法解析圖片格式');
  const mediaType=match[1];
  const base64Data=match[2];

  // PDF 用 document type，圖片用 image type
  const isPdf=mediaType==='application/pdf';

  const typeHint=billType==='auto'?'請自動判斷是電費單還是水費單':billType==='electricity'?'這是電費單':'這是水費單';

  const prompt=`請分析這份台灣公用事業帳單（${typeHint}），提取以下資訊並只回傳 JSON，不要任何說明文字：

{
  "billType": "electricity" 或 "water",
  "site": "場域名稱（如汐止、南港，從地址判斷）",
  "meter": "電號或水號",
  "startDate": "YYYY-MM-DD",
  "endDate": "YYYY-MM-DD",
  "period": "帳單期間說明",
  "kwh": 用電度數（數字，電費單用）,
  "usage": 用水度數（數字，水費單用）,
  "amount": 應繳金額（數字，不含單位）,
  "address": "用電/用水地址",
  "note": "其他備註（如跨期說明）"
}

如果某欄位讀不到，填 null。金額只取數字不含逗號。`;

  const contentBlock=isPdf
    ?{type:'document',source:{type:'base64',media_type:mediaType,data:base64Data}}
    :{type:'image',source:{type:'base64',media_type:mediaType,data:base64Data}};

  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      messages:[{role:'user',content:[contentBlock,{type:'text',text:prompt}]}]
    })
  });

  if(!resp.ok){
    const err=await resp.json().catch(()=>({}));
    throw new Error(( err.error ? err.error.message : '' )||`API 錯誤 ${resp.status}`);
  }

  const data=await resp.json();
  const text=( data.content ? (data.content.find(function(c){return c.type==='text';}) || {}).text : null )||'';
  // 解析 JSON（去除 markdown code fence）
  const clean=text.replace(/```json|```/g,'').trim();
  try{return JSON.parse(clean);}
  catch(e){throw new Error('AI 回傳格式異常：'+text.slice(0,200));}
}

// ── 確認匯入單筆 ──
function commitBill(id){
  const b=BILLS.find(x=>x.id===id);
  if(!b||!b.parsed)return;
  writeToRec(b);
  b.status='committed';
  b.committedAt=new Date().toLocaleString('zh-TW');
  saveBills(BILLS);saveRec(REC);
  toast('已匯入：'+b.fileName);
  renderBillList();
}

// ── 全部匯入 ──
function commitAll(){
  const pending=BILLS.filter(b=>b.status==='pending'&&b.parsed);
  if(!pending.length)return;
  pending.forEach(b=>{writeToRec(b);b.status='committed';b.committedAt=new Date().toLocaleString('zh-TW');});
  saveBills(BILLS);saveRec(REC);
  toast(`已匯入 ${pending.length} 份帳單`);
  renderBillList();
}

// ── 寫入 REC ──
function writeToRec(bill){
  const p=bill.parsed;if(!p)return;
  const yr=String(currentYear);
  // 從 endDate 取月份
  let month=1;
  if(p.endDate){const m=parseInt((p.endDate||'').slice(5,7));if(m>=1&&m<=12)month=m;}
  else if(p.startDate){const m=parseInt((p.startDate||'').slice(5,7));if(m>=1&&m<=12)month=m;}
  const mo=String(month);
  if(!REC[yr])REC[yr]={};
  if(!REC[yr][mo])REC[yr][mo]={electricity:[],refrigerant:[],fuel:[],septicTank:[]};

  if(p.billType==='electricity'){
    const kwh=parseFloat(p.kwh)||0;
    REC[yr][mo].electricity.push({
      id:bill.id,
      site:p.site||'汐止',
      meter:p.meter||'',
      kwh,
      amount:parseFloat(p.amount)||0,
      startDate:p.startDate||'',
      endDate:p.endDate||'',
      emission:calcElec(kwh,+yr),
      _evidence:{fileName:bill.fileName,scannedAt:bill.createdAt,address:p.address||''}
    });
  }
  // 水費單：目前存入備用結構（等水費模組）
  // 先存到 localStorage 備查
  const waterKey='ghg_water_'+yr;
  if(p.billType==='water'){
    try{
      const w=JSON.parse(localStorage.getItem(waterKey)||'[]');
      w.push({id:bill.id,site:p.site||'汐止',meter:p.meter||'',month,usage:parseFloat(p.usage)||0,amount:parseFloat(p.amount)||0,startDate:p.startDate||'',endDate:p.endDate||'',_evidence:{fileName:bill.fileName,scannedAt:bill.createdAt}});
      localStorage.setItem(waterKey,JSON.stringify(w));
    }catch(e){}
    // toast 提示
    setTimeout(()=>toast('水費單已存入備用區（水費模組待開發）','info'),100);
  }
}

// ── 刪除 ──
function deleteBill(id){
  BILLS=BILLS.filter(b=>b.id!==id);
  saveBills(BILLS);renderBillList();
  toast('已刪除','info');
}

// ── 清除已匯入 ──
function clearCommitted(){
  if(!confirm('確定要清除所有已匯入的佐證圖片？\n（資料不會被刪除，只清除圖片）'))return;
  BILLS=BILLS.filter(b=>b.status!=='committed');
  // 已匯入的只保留 metadata，清除 base64
  BILLS.forEach(b=>{if(b.status==='committed')b.imageBase64=null;});
  saveBills(BILLS);renderBillList();
  toast('已清除佐證圖片');
}

// ── 測試 API ──
async function testApiKey(){
  const key=( document.getElementById('apiKeyInput') ? document.getElementById('apiKeyInput').value : '' )||localStorage.getItem('ghg_api_key')||'';
  const el=document.getElementById('apiStatus');
  if(!key){if(el)el.textContent='請先填入 API Key';return;}
  if(el)el.textContent='測試中...';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:10,messages:[{role:'user',content:'hi'}]})});
    const d=await r.json();
    if(el)el.innerHTML=r.ok?'<span style="color:#346538">✅ 連線成功！可以開始掃描帳單</span>':'<span style="color:#AF4040">❌ 錯誤：'+(( d.error ? d.error.message : '' )||r.status)+'</span>';
  }catch(e){if(el)el.innerHTML='<span style="color:#AF4040">❌ 網路錯誤：'+esc(e.message)+'</span>';}
}

// ── 編輯帳單解析結果 ──
function editBill(id){
  const b=BILLS.find(x=>x.id===id);if(!b||!b.parsed)return;
  const p=b.parsed;
  const site=prompt('場域（汐止/南港）：',p.site||'汐止');if(site===null)return;
  const meter=prompt('電號/水號：',p.meter||'');if(meter===null)return;
  const kwh=prompt('用電度數（電費單）：',p.kwh||'');if(kwh===null)return;
  const amount=prompt('金額：',p.amount||'');if(amount===null)return;
  const startDate=prompt('起始日（YYYY-MM-DD）：',p.startDate||'');if(startDate===null)return;
  const endDate=prompt('結束日（YYYY-MM-DD）：',p.endDate||'');if(endDate===null)return;
  b.parsed=Object.assign({},p,{site:site,meter:meter,kwh:parseFloat(kwh)||p.kwh,amount:parseFloat(amount)||p.amount,startDate:startDate,endDate:endDate});
  saveBills(BILLS);renderBillList();
  toast('已更新解析結果');
}
