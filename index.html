.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:6px;border:none;background:transparent;color:var(--text3);font-size:17px;cursor:pointer;text-align:left;width:100%;transition:background .15s,color .15s;font-family:inherit;text-decoration:none}
.sb-btn:hover{background:rgba(255,255,255,.06);color:#fff}

/* ── Main ── */
#main{margin-left:250px;flex:1;padding:40px 48px 60px;max-width:calc(100vw - 250px)}
.section{display:none}
.section.active{display:block}

.hero{margin-bottom:40px}
.hero .tag{display:inline-block;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;background:var(--blue-bg);color:var(--blue);padding:0.3rem 0.8rem;border-radius:9999px;margin-bottom:1rem;font-weight:600}

.hero p{color:var(--text2);font-size:.95rem;max-width:620px}

/* ── Overview summary ── */
.summary-line{font-size:.95rem;color:var(--text2);line-height:1.9;margin-bottom:32px;max-width:680px}
.summary-line .num{font-family:var(--mono);font-weight:600;color:var(--blue)}

/* ── Section title ── */
.section-title{font-size:20px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin:36px 0 16px}

/* ── Card grid ── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;display:flex;flex-direction:column;gap:12px;text-decoration:none;color:inherit;box-shadow:0 1px 2px rgba(35,40,46,.04);transition:box-shadow .2s cubic-bezier(.4,0,.2,1),transform .2s cubic-bezier(.4,0,.2,1)}

.card p.desc{color:var(--text2);font-size:.9rem;flex-grow:1}
.card .footer-row{display:flex;justify-content:space-between;align-items:center;padding-top:.75rem;border-top:1px solid var(--border);font-size:.8rem}

.article-detail h1{font-family:var(--font-serif);font-size:1.8rem;font-weight:600;margin-bottom:8px}

/* ── About ── */
.about-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:680px}
.about-card h3{font-family:var(--font-serif);font-size:1.3rem;margin-bottom:10px}

.tip-box{border-radius:10px;padding:14px 18px;margin:16px 0;font-size:.9rem;line-height:1.8}
.tip-goal{background:var(--blue-bg);color:var(--blue)}
.tip-info{background:var(--green-bg);color:var(--green)}
.tip-warn{background:var(--yellow-bg);color:var(--yellow)}
.step-block{margin:28px 0 18px}
.step-block .step-title{font-family:var(--font-serif);font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.step-block .step-title .step-num{background:var(--sidebar);color:#fff;font-family:var(--mono);font-size:.75rem;padding:3px 9px;border-radius:9999px}
.step-block ol{margin:8px 0 8px 22px;font-size:.92rem;color:var(--text);line-height:1.85}
.step-done{font-size:.85rem;color:var(--green);font-weight:600;margin-top:6px}
.article-detail .body table{width:100%;border-collapse:collapse;margin:14px 0;font-size:.88rem}
.article-detail .body table th,.article-detail .body table td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.article-detail .body table th{background:var(--bg3);font-weight:700}
.article-detail .body a{color:var(--blue);text-decoration:underline}

/* ── Article category filter ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{font-size:.85rem;font-weight:600;padding:7px 16px;border-radius:9999px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s}
.filter-btn:hover{background:var(--bg3)}
.filter-btn.active{background:var(--sidebar);color:#fff;border-color:var(--sidebar)}

@media (max-width:900px){
  #sidebar{display:none}
  #main{margin-left:0;max-width:100vw;padding:24px}
  .grid{grid-template-columns:1fr}
}

   excerpt:'企業配置安全衛生人員，就像大樓依樓層高度決定要裝幾台電梯。本文依《職業安全衛生管理辦法》拆解第一類、第二類事業的配置門檻，附法規連結與真實案例試算。',
   body:`<div class="tip-box tip-goal">🎯 這篇文章帶你搞懂：怎麼判斷自己的事業屬於第幾類、勞工人數怎麼算，準確抓出該配置的安全衛生人員層級，文末附官方法規連結與試算範例。</div>

   <p>企業配置安全衛生人員的邏輯，其實跟大樓依樓層高度決定要裝幾台電梯、要不要設管理委員會很像——規模越大、風險越高，門檻就越嚴格，配置的人力規格也要跟著升級。</p>
   <p>許多企業主直到勞動檢查上門，才發現自己「少配了一個人」。這通常不是故意違規，而是搞不清楚自己屬於第幾類事業、人數該怎麼算、跨過門檻後又該配置什麼層級的人員。</p>
   <p>本文依《職業安全衛生管理辦法》逐一拆解第一類、第二類事業的配置門檻，並附上官方法規連結與實際試算範例，讓你五分鐘內就能套用在自己的事業單位上。</p>

   <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">

   <h4>一、為什麼配置門檻會依「事業類別」不同？</h4>
   <p>法規不是對所有產業都用同一套標準，而是先把事業依風險程度分成三類，風險越高的產業，門檻就訂得越嚴格：</p>
   <table>
     <tr><th>事業類別</th><th>風險特性</th><th>常見產業</th></tr>
     <tr><td><b>第一類事業</b></td><td>高風險，重大職災機率高</td><td>製造業、營造業、化工業</td></tr>
     <tr><td><b>第二類事業</b></td><td>中等風險</td><td>批發零售、倉儲、部分服務業</td></tr>
     <tr><td>第三類事業</td><td>低風險</td><td>一般辦公室、金融、教育</td></tr>
   </table>
   <p>法規依據是《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=N0060001" target="_blank" rel="noopener">職業安全衛生法</a>》授權訂定的《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=N0060027" target="_blank" rel="noopener">職業安全衛生管理辦法</a>》，裡面明確規定了不同類別、不同人數規模下應配置的人員層級。</p>

   <h4>二、第一類事業：100 人是第一個關鍵門檻</h4>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 1</span> 先確認自己的勞工人數區間</div>
     <ol>
       <li>未滿 100 人：依規模設置丙級或乙級職業安全衛生業務主管</li>
       <li>100 人以上：應設置直接隸屬雇主的一級管理單位，並置甲級業務主管</li>
       <li>300 人以上：除一級管理單位外，需配置專職的職業安全衛生人員</li>
     </ol>
     <div class="step-done">✅ 完成這步，你已經知道自己落在哪個門檻區間</div>
   </div>
   <div class="tip-box tip-info">💡 試算範例：一家有 150 名勞工的製造業（第一類事業），已超過 100 人門檻，依規定須設置直接隸屬雇主的一級管理單位，並配置甲級職業安全衛生業務主管 1 人。</div>

   <h4>三、第二類事業：300 人是關鍵門檻</h4>
   <p>第二類事業的風險相對較低，因此門檻人數訂得比第一類事業高：未滿 300 人者，依規模配置丙級或乙級業務主管即可；達到 300 人以上，才需要設置直接隸屬雇主的一級管理單位。</p>
   <table>
     <tr><th>事業類別</th><th>人數門檻</th><th>應配置</th></tr>
     <tr><td>第一類</td><td>100 人以上</td><td>一級管理單位 + 甲級業務主管</td></tr>
     <tr><td>第二類</td><td>300 人以上</td><td>一級管理單位</td></tr>
   </table>

   <h4>四、沒配對會怎樣？</h4>
   <div class="tip-box tip-warn">⚠️ 未依規定配置安全衛生人員或管理單位，屬於違反《職業安全衛生法》的行為，可能面臨罰鍰並被要求限期改善，詳細罰則建議直接查閱《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=N0060001" target="_blank" rel="noopener">職業安全衛生法</a>》罰則章節。</div>

   <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">

   <p>從第一類事業的 100 人門檻，到第二類事業的 300 人門檻，配置邏輯的核心其實是同一句話：規模越大、風險越高，管理的「正式程度」就要跟著提升。</p>
   <p>掌握這套邏輯之後，你不只是在應付勞檢，而是真正為組織建立起能承擔風險的管理架構。</p>
   <p>未來企業規模持續變動時，建議每年至少重新檢視一次勞工人數與事業類別，避免因為組織擴編而不知不覺跨過門檻。</p>
   <div class="tip-box tip-info">📌 延伸閱讀：中小企業做溫室氣體盤查，第一步該從哪裡開始？</div>`},
  {id:'a2',date:'2026-06-10',category:'esg',tags:['ESG','溫室氣體'],title:'中小企業做溫室氣體盤查，第一步該從哪裡開始？範疇一、二、三全解析',
   excerpt:'溫室氣體盤查就像先記帳才能談省錢。本文依《氣候變遷因應法》與盤查登錄辦法，拆解範疇一、二、三的定義與中小企業的具體執行步驟。',
   body:`<div class="tip-box tip-goal">🎯 這篇文章帶你搞懂：範疇一、二、三到底在算什麼，中小企業該從哪一步開始蒐集數據，文末附法規連結與常見挑戰提醒。</div>

   <p>溫室氣體盤查這件事，本質上就像「先記帳才能談省錢」——不知道自己每年排放多少碳，談減碳策略都只是空話。</p>
   <p>近年法規與國際供應鏈的要求步步逼近，許多中小企業即便知道該做盤查，卻不知道第一步該從哪裡下手，蒐集數據時又常常抓不到重點。</p>
   <p>本文依《氣候變遷因應法》與《溫室氣體排放量盤查登錄及查驗管理辦法》，拆解範疇一、二、三的定義，並提供中小企業可以馬上套用的四個執行步驟。</p>

   <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">

   <h4>一、為什麼現在要做盤查？法規與供應鏈雙重驅動</h4>
   <p>2023 年修正的《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=O0020098" target="_blank" rel="noopener">氣候變遷因應法</a>》，把台灣的減碳路徑正式入法，中央主管機關可公告應進行排放量盤查登錄的事業範圍。除了法規驅動，國際品牌客戶要求供應鏈揭露碳排放數據，也讓中小企業不得不提早準備。</p>

   <h4>二、範疇一、二、三：先搞懂在算什麼</h4>
   <p>範疇一就像「自己車子加的油」——是企業直接燃燒燃料產生的排放；範疇二像「家裡的電費單」——是外購電力間接造成的排放；範疇三則像「買進來的所有原料、運輸與廢棄物背後產生的碳」，涵蓋範圍最廣也最難計算。</p>
   <table>
     <tr><th>範疇</th><th>定義</th><th>常見排放源</th></tr>
     <tr><td><b>範疇一</b></td><td>直接排放</td><td>鍋爐燃料、公司車輛油耗</td></tr>
     <tr><td><b>範疇二</b></td><td>能源間接排放</td><td>外購電力、外購蒸氣</td></tr>
     <tr><td>範疇三</td><td>其他間接排放</td><td>原料採購、員工通勤、廢棄物處理</td></tr>
   </table>

   <h4>三、實際執行的四個步驟</h4>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 1</span> 界定組織邊界與營運邊界</div>
     <p>先確認哪些廠房、設備、營運活動要納入盤查範圍，這是後續所有數據蒐集的基礎。</p>
     <div class="step-done">✅ 完成這步，你已經畫出盤查的「地圖範圍」</div>
   </div>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 2</span> 蒐集範疇一、二的基礎數據</div>
     <ol>
       <li>每月用電量（範疇二）</li>
       <li>燃料使用量，如柴油、天然氣（範疇一）</li>
       <li>公司車輛油耗紀錄（範疇一）</li>
     </ol>
     <div class="step-done">✅ 完成這步，你已經有第一批可用的原始數據</div>
   </div>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 3</span> 套用排放係數換算成 CO2e</div>
     <p>把用電量、用油量等實際使用量，乘上中央主管機關公告的排放係數，換算成統一單位的 CO2e（二氧化碳當量），才能跨能源類型做加總與比較。</p>
     <div class="step-done">✅ 完成這步，你已經算出第一份碳排放數字</div>
   </div>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 4</span> 登錄到指定資訊平台</div>
     <p>若事業單位屬於中央主管機關公告應盤查登錄的對象，須依《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=O0020102" target="_blank" rel="noopener">溫室氣體排放量盤查登錄及查驗管理辦法</a>》規定期限完成登錄。</p>
     <div class="step-done">✅ 完成這步，你的盤查結果正式具備法規效力</div>
   </div>

   <h4>四、常見挑戰</h4>
   <div class="tip-box tip-warn">⚠️ 中小企業常見的卡關點：用電量、油耗等原始數據分散在不同部門、單據不齊全；排放係數年年更新，舊版係數誤用會讓計算結果失準；範疇三牽涉供應商配合度，往往是最晚才能補齊的一塊。</div>

   <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">

   <p>從範疇一、二的基礎盤查，到範疇三的供應鏈延伸，這是一條需要逐年累積的路，沒有企業能一步到位。</p>
   <p>盤查的真正價值不是應付法規，而是讓企業第一次「看見」自己的碳排放結構，知道減碳該從哪個環節下手最有效益。</p>
   <p>建議中小企業先把範疇一、二的數據蒐集流程標準化，建立每月固定回報機制，再逐步擴展到範疇三的供應鏈盤查。</p>
   <div class="tip-box tip-info">📌 延伸閱讀：用 AI 重構職安衛文件管理，從人工比對到自動化提醒的實務轉型</div>`},
  {id:'a3',date:'2026-06-01',category:'cross',tags:['AI','職安衛'],title:'用 AI 重構職安衛文件管理：從人工比對到自動化提醒的實務轉型',
   excerpt:'傳統職安衛文件管理就像沒有提醒功能的萬年曆。本文說明如何把法規規則寫進系統，讓規則引擎與 AI 接手重複性比對工作，並點出目前技術的限制。',
   body:`<div class="tip-box tip-goal">🎯 這篇文章帶你搞懂：職安衛文件管理的傳統瓶頸在哪、規則引擎怎麼運作、AI 在其中該扮演什麼角色，以及目前技術的限制在哪裡。</div>

   <p>傳統的職安衛文件管理，常常像一本「沒有提醒功能的萬年曆」——法規異動、證照到期、會議追蹤，每件事都得靠人腦記住期限，一旦人員異動或忙碌疏忽，就容易出現缺口。</p>
   <p>法規異動比對、回訓週期推算、會議決議追蹤，這些工作本質上都是「重複性的規則比對」，卻長期仰賴人工逐項核對，耗時又容易遺漏。</p>
   <p>本文說明如何把法規規則「寫進系統」，讓規則引擎與 AI 接手重複性比對工作，同時誠實點出目前這類自動化工具的技術限制。</p>

   <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">

   <h4>一、傳統做法的瓶頸在哪裡？</h4>
   <table>
     <tr><th>工作項目</th><th>傳統做法</th><th>常見問題</th></tr>
     <tr><td>法規異動比對</td><td>人工追蹤公告、訂閱電子報</td><td>容易漏看修法時間點</td></tr>
     <tr><td>證照回訓提醒</td><td>人工排程、Excel 標色提醒</td><td>人員異動後容易斷層</td></tr>
     <tr><td>會議決議追蹤</td><td>紙本紀錄或分散的 Word 檔</td><td>難以彙整查詢與覆盤</td></tr>
   </table>

   <h4>二、把「規則」寫進系統：規則引擎怎麼運作</h4>
   <p>規則引擎可以理解成「把法規條文翻譯成 if-then 的客服機器人」——例如《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=N0060010" target="_blank" rel="noopener">職業安全衛生教育訓練規則</a>》規定的回訓週期與時數，只要把規則轉成系統邏輯，輸入人員的職類與上次訓練日期，系統就能自動推算下次回訓的到期日，不需要每次重新查表。</p>

   <h4>三、AI 在這裡扮演的角色：加速比對，不取代判斷</h4>
   <div class="tip-box tip-info">❓ 那 AI 是不是要取代職安衛人員的專業判斷？<br><br>不是。AI 與規則引擎能做的是初步比對、整理與提醒——例如掃出哪些證照即將到期、哪些法規條文有修訂、哪些會議決議尚未結案。但法規的最終解釋、風險的專業判斷，仍需要職安衛人員親自確認，工具的角色是減少人工核對的時間，不是取代決策。</div>

   <h4>四、技術限制與該注意的風險</h4>
   <div class="tip-box tip-warn">⚠️ 法規規則寫進系統後，仍需要人工定期確認是否為最新版本，修法後若沒有同步更新規則，系統反而會給出錯誤建議。對於文字模糊、需要脈絡判斷的條文，AI 也可能誤判，這類情況務必交由專業人員複核，不要直接採信系統輸出的結論。</div>

   <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">

   <p>從人工逐項核對，到規則引擎自動比對，再到 AI 協助初步篩選，這是一條把「重複性工作」逐步交給工具的過程，而不是把「專業判斷」交出去。</p>
   <p>真正的轉型價值，不在於工具有多聰明，而在於它讓職安衛人員把時間花在真正需要專業判斷的事情上，而不是埋頭核對日期與條文。</p>
   <p>下一步可以思考的是，如何把法規更新的監控也自動化，讓規則庫本身能更即時跟上修法腳步。</p>
   <div class="tip-box tip-info">📌 延伸閱讀：第一類、第二類事業單位的安全衛生人員配置怎麼算？</div>`},
  {id:'a4',date:'2026-06-21',category:'osh',tags:['職安衛','法規','不法侵害'],title:'不法侵害怎麼認定？7月1日職安法霸凌防治專章上路，企業該怎麼準備',
   excerpt:'從4個真實判決拆解「管理」與「霸凌」的法律界線，並解析7月1日起《職業安全衛生法》新增霸凌防治專章對企業申訴、調查機制的新要求，附法規連結與企業端SOP。',
   body:`<div class="tip-box tip-goal">🎯 這篇文章帶你搞懂：法院怎麼判斷「管理權行使」與「職場霸凌」的界線、7月1日起職安法新增的霸凌防治專章對企業有什麼新義務，以及企業端可以照走的標準處理流程。</div>

   <p>不法侵害這件事，像是一條畫在地上、但肉眼看不見的界線——管理權跟霸凌站在同一條路上，差別只在於有沒有越線。問題是，企業往往要等到員工申訴、甚至上了法院，才發現自己已經踩過去了。</p>
   <p>員工申訴霸凌，不代表行為就一定違法；但企業也不能因此就什麼都不處理。這條界線該怎麼劃，連法院判決彼此之間都各有側重的角度。</p>
   <p>本文從 4 個真實判決拆解法院認定的核心邏輯，並解析 2026 年 7 月 1 日起上路的職安法霸凌防治專章，企業的申訴、調查機制該怎麼準備。</p>

   <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">

   <h4>一、不法侵害的法律定義</h4>
   <p>依《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=N0060001" target="_blank" rel="noopener">職業安全衛生法</a>》第 6 條第 2 項規定，雇主對於執行職務因他人行為遭受身體或精神不法侵害，應採取必要的預防措施。白話來說：<b>不是員工「覺得」被霸凌就成立</b>，而是行為要符合特定構成要件，這也是為什麼同樣是主管要求加班、調職，有些被法院認定是合理管理，有些卻被認定是霸凌。</p>

   <h4>二、法院怎麼判斷「管理」跟「霸凌」的界線？四個核心要件</h4>
   <p>整理近期判決可以發現，法院認定不法侵害通常會檢視以下四個要件：</p>
   <table>
     <tr><th>要件</th><th>檢視重點</th></tr>
     <tr><td><b>是否有敵意或惡意</b></td><td>主管是否基於敵視、討厭、歧視等目的</td></tr>
     <tr><td><b>是否持續反覆</b></td><td>單次衝突或單次嚴厲管理，通常不容易構成霸凌</td></tr>
     <tr><td><b>是否逾越社會通念</b></td><td>行為是否超過一般職場可接受的程度</td></tr>
     <tr><td><b>是否與管理目的有關</b></td><td>若基於工作需求、稽核、績效、紀律調整，較可能被認定為管理權行使</td></tr>
   </table>

     <tr><th>案件</th><th>案件性質</th><th>判決結果</th><th>法院重點</th></tr>

     <tr><td>信義房屋案<br><span style="color:var(--text3);font-size:.8rem">臺北地方法院 114勞小1號</span></td><td>職場霸凌損害賠償</td><td>勞方敗訴，資方及主管免賠</td><td>搬運年鑑、催促簽呈等屬一般公務指派，未逾越合理範圍，不構成霸凌</td></tr>
     <tr><td>南亞科技案<br><span style="color:var(--text3);font-size:.8rem">新北地方法院 113訴232號</span></td><td>確認僱傭關係存在，雇主依勞基法第11條第5款資遣</td><td>勞方敗訴，資遣合法</td><td>不能勝任不只看能力不足，也包含「能做卻不做」的消極不作為；資方已多次輔導與調整，符合最後手段性</td></tr>
     <tr><td>公審決字案<br><span style="color:var(--text3);font-size:.8rem">115公審決字第000356號</span></td><td>公務員懲處爭議</td><td>復審駁回，申誡一次合法</td><td>霸凌不成立，不代表行為就合法；高聲咆嘯、摔公文、厲聲斥責、黃色笑話，仍屬言行失檢，可予懲處</td></tr>
   </table>

   <h4>三、不一定構成霸凌的管理權行使 vs 高風險行為</h4>
   <table>
     <tr><th>不一定構成霸凌（多屬管理權）</th><th>可能構成霸凌（高風險）</th></tr>
     <tr><td>✅ 要求員工提交報告</td><td>❌ 針對特定人長期羞辱</td></tr>
     <tr><td>✅ 催促簽呈或預算資料</td><td>❌ 公開貶低人格</td></tr>
     <tr><td>✅ 要求交出稽核資料</td><td>❌ 故意孤立、排擠</td></tr>
     <tr><td>✅ 要求配合 PIP</td><td>❌ 不合理加重工作</td></tr>
     <tr><td>✅ 調動部門或工作內容</td><td>❌ 用歧視、敵意語言對待</td></tr>
     <tr><td>✅ 對違規行為約談、懲處</td><td>❌ 申訴後報復懲處</td></tr>
   </table>

   <h4>四、7 月 1 日起，職安法「霸凌防治專章」上路了什麼？</h4>
   <p>過去不法侵害預防主要依附在《職業安全衛生法》第 6 條的概括規定，具體預防措施則寫在《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=N0060009" target="_blank" rel="noopener">職業安全衛生設施規則</a>》第 324-3 條這個行政層級的規則裡，並沒有明確規定企業的申訴、調查程序。2026 年 7 月 1 日起，職安法新增「霸凌防治專章」，把不法侵害預防正式拉到法律層級，並依企業規模課予分級義務：</p>
   <table>
     <tr><th>企業規模</th><th>新增義務</th></tr>
     <tr><td>10 人以上</td><td>應建立申訴管道</td></tr>
     <tr><td>30 人以上</td><td>應訂定預防措施（書面計畫）</td></tr>
     <tr><td>100 人以上</td><td>應設置調查委員會</td></tr>
   </table>
   <div class="tip-box tip-warn">⚠️ 新制上路後罰鍰金額大幅提高，企業若未依規定建立申訴、調查機制，最高罰鍰可達 450 萬元。具體條文編號待行政院公告施行版本確定後可能調整，建議上路前直接查閱《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=N0060001" target="_blank" rel="noopener">職業安全衛生法</a>》最新版本確認條號。</div>

   <h4>五、企業端標準處理流程（SOP）</h4>

       <path d="M560,90 L560,120 L80,120 L80,148" style="fill:none;stroke:var(--blue);stroke-width:2" marker-end="url(#arrowB)"/>

       <!-- row2 nodes -->
       <rect x="10" y="150" width="140" height="70" rx="10" style="fill:var(--green-bg);stroke:var(--green)"/>

       <text x="80" y="190" text-anchor="middle" font-size="12" style="fill:var(--text)" font-weight="700">管理行為留痕</text>

   </svg>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 1</span> 釐清事件</div>
     <p>分清管理衝突、績效問題、職場不法侵害或溝通不良，這一步決定後面要走哪一套程序。</p>
   </div>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 2</span> 蒐集事實</div>
     <p>保留對話紀錄、信件、工作分派、面談、出勤等紀錄，事後補做永遠比不上事中即時留存。</p>
   </div>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 3</span> 啟動調查</div>
     <p>涉及霸凌或不法侵害申訴，應及成立調查程序，不要因為「看起來不嚴重」就略過正式流程。</p>
   </div>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 4</span> 避免報復疑慮</div>
     <p>申訴後任何懲處都要謹慎，避免被認定為秋後算帳，這是法院審查的重點之一。</p>
   </div>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 5</span> 管理行為留痕</div>
     <p>PIP、面談、調職、輔導、警告都要有書面紀錄，這是證明管理正當性與程序合法性最重要的關鍵。</p>
   </div>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 6</span> 檢查比例原則</div>
     <p>懲處要與行為嚴重性相當，不能過度懲戒，否則反而會弱化雇主立場。</p>
   </div>
   <div class="step-block">
     <div class="step-title"><span class="step-num">STEP 7</span> 檢查最後手段性</div>
     <p>解僱或資遣前，確認是否已沒有其他較輕手段，這是前述能元科技案、南亞科技案兩個判決共同強調的重點。</p>

   <p>7 月 1 日的修法把這條界線的責任更明確地交到企業手上——不是不能管理員工，而是管理行為要有合理理由、正當程序與完整紀錄。</p>
   <p>學會合法管理、理性管理、留痕管理，才能降低企業端的爭訟風險，同時也保護真正受到不法侵害的員工。</p>

ARTICLES.sort((a,b)=>new Date(b.date)-new Date(a.date));

const CATEGORIES=[
  {key:'all',label:'全部'},
  {key:'ai',label:'AI'},
  {key:'esg',label:'永續／ESG'},
  {key:'osh',label:'職安衛'},
  {key:'cross',label:'跨領域'}
];

// ═══════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════
let currentSection='overview';
let currentArticle=null;
let currentArticleFilter='all';

function renderNav(){
  const el=document.getElementById('nav');
  el.innerHTML='';
  NAV.forEach(g=>{
    if(g.group){
      const gd=document.createElement('div');
      gd.className='sb-group';
      gd.textContent=g.group;
      el.appendChild(gd);
    }
    g.items.forEach(item=>{
      if(item.href){
        const a=document.createElement('a');
        a.className='sb-btn';
        a.href=item.href;
        a.textContent=item.label;
        el.appendChild(a);
      }else{
        const isActive=currentSection===item.id&&(item.id!=='articles'||currentArticleFilter===(item.filter||'all'));
        const btn=document.createElement('button');
        btn.className='sb-btn'+(isActive?' active':'');
        btn.textContent=item.label;
        btn.onclick=()=>{currentSection=item.id;currentArticle=null;currentArticleFilter=item.filter||'all';renderNav();renderMain();};
        el.appendChild(btn);
      }
    });
  });
}

function toolCard(t){
  return`<a class="card${t.featured?' featured':''}" href="${t.href}">
    <div class="tags">${t.tags.map(([label,cls])=>`<span class="${cls}">${label}</span>`).join('')}</div>
    <h3>${t.title}</h3>
    <p class="desc">${t.desc}</p>
    <div class="footer-row">
      <span class="status"><span class="dot"></span> 已上線</span>
      <span class="link">前往使用 →</span>
    </div>
  </a>`;
}

function renderMain(){
  const main=document.getElementById('main');

  if(currentSection==='overview'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag">作品集總覽</span>
        <h1>職安 × AI × 永續</h1>
        <p>整理目前完成的職業安全衛生與永續管理工具，結合資料自動化與法規規則引擎，協助企業以更有效率的方式管理日常職安衛與 ESG 事務。</p>
      </div>
      <p class="summary-line">目前已上線 <span class="num">${TOOLS.length}</span> 項工具，涵蓋職業安全衛生 <span class="num">${TOOLS.filter(t=>t.category==='osh').length}</span> 項、ESG／永續 <span class="num">${TOOLS.filter(t=>t.category==='esg').length}</span> 項，並累積 <span class="num">${ARTICLES.length}</span> 篇文章，持續記錄法規、ESG 與 AI 應用的實務心得。</p>
      <div class="section-title">最新文章</div>
      <div class="article-list">${ARTICLES.slice(0,2).map(articleCard).join('')}</div>
      <div class="section-title">職業安全衛生工具</div>
      <div class="grid">${TOOLS.filter(t=>t.category==='osh').map(toolCard).join('')}</div>
      <div class="section-title">永續 ／ ESG 工具</div>
      <div class="grid">${TOOLS.filter(t=>t.category==='esg').map(toolCard).join('')}</div>`;
    bindArticleClicks();
    return;
  }

  if(currentSection==='osh'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag tag-blue">職業安全衛生</span>
        <h1>職業安全衛生工具</h1>
        <p>涵蓋法規管理、會議追蹤與教育訓練／證照管理，協助企業掌握法規異動、追蹤會議決議並自動規劃證照回訓。</p>
      </div>
      <div class="grid">${TOOLS.filter(t=>t.category==='osh').map(toolCard).join('')}</div>`;
    return;
  }

  if(currentSection==='esg'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag tag-green">永續 ／ ESG</span>
        <h1>永續 ／ ESG 工具</h1>
        <p>協助企業彙整溫室氣體排放數據，建立可追蹤的碳盤查資料庫，作為 ESG 報告與淨零規劃的基礎。</p>
      </div>
      <div class="grid">${TOOLS.filter(t=>t.category==='esg').map(toolCard).join('')}</div>`;
    return;
  }

  if(currentSection==='articles'){
    if(currentArticle){
      const a=ARTICLES.find(x=>x.id===currentArticle);
      main.innerHTML=`
        <div class="article-detail active">
          <a class="back" onclick="backToArticles()">← 返回文章列表</a>
          <div class="article-meta">${a.date}　${a.tags.map(t=>'#'+t).join(' ')}</div>
          <h1>${a.title}</h1>
          <div class="body" style="margin-top:18px">${a.body}</div>
        </div>`;
      return;
    }
    const filtered=currentArticleFilter==='all'?ARTICLES:ARTICLES.filter(a=>a.category===currentArticleFilter);
    main.innerHTML=`
      <div class="hero">
        <span class="tag tag-yellow">文章專欄</span>
        <h1>文章專欄</h1>
        <p>分享職安衛法規解讀、ESG 實務心得與 AI 應用於行政流程自動化的相關內容。</p>
      </div>
      <div class="filter-row">${CATEGORIES.map(c=>`<button class="filter-btn${currentArticleFilter===c.key?' active':''}" data-cat="${c.key}">${c.label}</button>`).join('')}</div>
      <div class="article-list">${filtered.length?filtered.map(articleCard).join(''):'<p style="color:var(--text2);font-size:.9rem">這個分類還沒有文章。</p>'}</div>`;
    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.onclick=()=>{currentArticleFilter=btn.getAttribute('data-cat');renderNav();renderMain();};
    });
    bindArticleClicks();
    return;
  }

  if(currentSection==='about'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag">關於</span>
        <h1>關於我</h1>
        <p>Oscar Hsiao — 致力於將職業安全衛生管理流程數位化、自動化，並結合永續 ESG 議題打造實用工具。</p>
      </div>
      <div class="about-card">
        <h3>專長領域</h3>
        <div class="about-list">
          職業安全衛生法規管理與證照訓練規劃<br>
          溫室氣體盤查與 ESG 報告資料整理<br>
          以 AI 與規則引擎打造行政流程自動化工具<br>
          前端網頁開發（HTML / CSS / JavaScript）
        </div>
        <h3 style="margin-top:20px">聯絡方式</h3>
        <p>如對本作品集的工具有興趣，或想討論客製化部署，歡迎透過 GitHub / Email 與我聯繫。</p>
      </div>`;
    return;
  }
}

function articleCard(a){
  return`<div class="article-card" data-id="${a.id}">
    <div class="article-meta">${a.date}　${a.tags.map(t=>'#'+t).join(' ')}</div>
    <h3>${a.title}</h3>
    <p>${a.excerpt}</p>
  </div>`;
}
function bindArticleClicks(){
  document.querySelectorAll('.article-card').forEach(el=>{
    el.onclick=()=>{currentSection='articles';currentArticle=el.getAttribute('data-id');renderNav();renderMain();window.scrollTo(0,0);};
  });
}
function backToArticles(){currentArticle=null;renderMain();window.scrollTo(0,0);}

renderNav();
renderMain();
</script>
