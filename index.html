<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FBFBFA;--bg2:#fff;--bg3:#F7F6F3;
  --border:#EAEAEA;--border2:#DDDBD6;
  --text:#2F3437;--text2:#787774;--text3:#A8A29E;
  --blue:#1F6C9F;--blue-bg:#E1F3FE;
  --green:#346538;--green-bg:#EDF3EC;
  --yellow:#956400;--yellow-bg:#FBF3DB;
  --red:#AF4040;--red-bg:#FCEAEA;
  --purple:#6B4FA0;--purple-bg:#EFEAF7;
  --gold:#C9A24B;--sidebar:#4E565C;
  --font:'Noto Sans TC',-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei',sans-serif;
  --font-serif:'Noto Serif TC',-apple-system,serif;
  --mono:'JetBrains Mono','Courier New',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── Sidebar ── */
#sidebar{width:250px;min-height:100vh;background:#4E565C;position:fixed;top:0;left:0;padding:0;z-index:100;display:flex;flex-direction:column;transition:width .18s ease}
.sb-logo{padding:28px 22px 18px;border-bottom:1px solid rgba(255,255,255,.1);position:relative}
.sb-brand{font-family:var(--font-serif);font-size:21px;font-weight:600;color:#fff}
.sb-tag{font-size:14px;color:#C9A24B;letter-spacing:.12em;margin-top:6px;font-weight:600}
.sb-nav{padding:14px 10px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
.sb-group{margin-top:14px;margin-bottom:2px;padding:0 12px;font-size:14px;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.65);font-size:15px;cursor:pointer;text-align:left;width:100%;transition:all .15s;font-family:inherit;text-decoration:none}
.sb-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-btn.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.sb-btn .label-short{display:none;width:100%;text-align:center}
.sb-icon{flex-shrink:0;width:22px;text-align:center;font-size:19px;color:rgba(255,255,255,.4);transition:color .15s}
.sb-btn:hover .sb-icon,.sb-btn.active .sb-icon{color:rgba(255,255,255,.75)}
.sb-chevron{flex:1;text-align:right;font-size:16px;color:rgba(255,255,255,.35);transition:transform .2s ease}
.sb-acc-head.open .sb-chevron{transform:rotate(90deg)}
.sb-acc-body{max-height:0;overflow:hidden;transition:max-height .22s ease}
.sb-acc-body.open{max-height:400px}
.sb-sub{padding-left:38px;font-size:14px}
.sb-foot{padding:16px 22px;border-top:1px solid rgba(255,255,255,.1);font-size:14px;color:rgba(255,255,255,.35)}
.sb-toggle{position:absolute;top:24px;right:-14px;width:28px;height:28px;border-radius:50%;background:#4E565C;border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;z-index:101;transition:transform .18s ease}
body.sidebar-collapsed #sidebar{width:64px}
body.sidebar-collapsed #main{margin-left:64px;max-width:calc(100vw - 64px)}
body.sidebar-collapsed .sb-tag,
body.sidebar-collapsed .sb-foot,
body.sidebar-collapsed .sb-acc-body,
body.sidebar-collapsed .sb-chevron,
body.sidebar-collapsed .sb-btn .label-full{display:none}
body.sidebar-collapsed .sb-brand{font-size:14px;text-align:center}
body.sidebar-collapsed .sb-btn{justify-content:center;padding:10px 4px}
body.sidebar-collapsed .sb-btn .label-short{display:block}
body.sidebar-collapsed .sb-icon{width:auto;font-size:21px}
body.sidebar-collapsed .sb-toggle{transform:rotate(180deg)}

/* ── Main ── */
#main{margin-left:250px;flex:1;padding:40px 48px 60px;max-width:calc(100vw - 250px)}
.section{display:none}
.section.active{display:block}

/* ── Hero ── */
.hero{margin:0 auto 40px;max-width:960px}
.hero .tag{display:inline-block;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;background:var(--blue-bg);color:var(--blue);padding:0.3rem 0.8rem;border-radius:9999px;margin-bottom:1rem;font-weight:600}
.hero h1{font-family:var(--font-serif);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:600;margin-bottom:.75rem}
.hero p{color:var(--text2);font-size:.95rem;max-width:620px}

/* ── Metric / overview ── */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:0 auto 32px;max-width:960px}
.metric-card{background:var(--bg2);border-radius:10px;border:1px solid var(--border);padding:18px 20px}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.metric-value{font-size:28px;font-weight:700;font-family:var(--font-serif);color:var(--blue)}
.metric-unit{font-size:12px;color:var(--text2);margin-top:2px}

/* ── Section title ── */
.section-title{font-family:var(--font-serif);font-size:1.4rem;font-weight:600;color:var(--text);margin:36px auto 16px;max-width:960px}
.section-title:first-of-type{margin-top:0}

/* ── Card grid ── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:960px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;display:flex;flex-direction:column;gap:12px;text-decoration:none;color:inherit;transition:box-shadow .25s ease,transform .25s ease;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--blue)}
.card.cat-esg::before{background:var(--green)}
.card:hover{box-shadow:0 8px 24px rgba(0,0,0,.08);transform:translateY(-3px)}
.card.featured{grid-column:1/-1}
.card .tags{display:flex;gap:8px;flex-wrap:wrap}
.card .tags span{font-size:.7rem;letter-spacing:.05em;text-transform:uppercase;border-radius:9999px;padding:.25rem .7rem;font-weight:600}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-yellow{background:var(--yellow-bg);color:var(--yellow)}
.card h3{font-family:var(--font-serif);font-size:1.4rem;font-weight:600;transition:color .2s ease}
.card:hover h3{color:var(--blue)}
.card.cat-esg:hover h3{color:var(--green)}
.card p.desc{color:var(--text2);font-size:.88rem;line-height:1.7;flex-grow:1}
.card .footer-row{display:flex;justify-content:space-between;align-items:center;padding-top:.75rem;border-top:1px solid var(--border);font-size:.8rem}
.card .footer-row .link{font-weight:600;display:flex;align-items:center;gap:.3rem;color:var(--blue);transition:gap .2s ease}
.card:hover .footer-row .link{gap:.55rem}
.card .footer-row .status{color:var(--green);font-size:.75rem;display:flex;align-items:center;gap:.4rem}
.card .footer-row .status .dot{width:6px;height:6px;border-radius:50%;background:#5DA862}

/* ── Articles (gyozalab.com 風格：圖文左右交錯卡片) ── */
.article-list{display:flex;flex-direction:column;gap:24px;max-width:960px;margin:0 auto}
.empty{color:var(--text2);font-size:.9rem;padding:24px 0;text-align:center;border:1px dashed var(--border);border-radius:12px}
.article-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;cursor:pointer;overflow:hidden;display:grid;grid-template-columns:2fr 3fr;align-items:stretch;transition:box-shadow .25s ease,transform .25s ease}
.article-card:nth-child(even){direction:rtl}
.article-card:nth-child(even) .article-card-body{direction:ltr}
.article-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.08);transform:translateY(-3px)}
.article-card-cover{position:relative;overflow:hidden;aspect-ratio:1/1;background:var(--bg3)}
.article-card-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .35s ease}
.article-card:hover .article-card-cover img{transform:scale(1.06)}
.article-card-body{padding:24px 28px;display:flex;flex-direction:column;justify-content:center;gap:8px}
.article-card-body .meta{font-size:.8rem;color:var(--text2);line-height:1.4}
.article-card-body h3{font-family:var(--font-serif);font-size:1.45rem;font-weight:700;line-height:1.4;transition:color .2s ease}
.article-card:hover .article-card-body h3{color:var(--blue)}
.article-card-body .desc{font-size:.9rem;color:var(--text2);line-height:1.75;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.article-card-body .tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.article-card-body .tags span{font-size:.72rem;background:var(--bg3);color:var(--text2);border-radius:9999px;padding:.25rem .7rem}
.article-card-body .read-more{font-size:.85rem;font-weight:600;color:var(--blue);display:inline-flex;align-items:center;gap:4px;margin-top:6px;transition:gap .2s ease}
.article-card:hover .article-card-body .read-more{gap:8px}
@media (max-width:760px){
  .article-card,.article-card:nth-child(even){grid-template-columns:1fr;direction:ltr}
  .article-card-cover{aspect-ratio:1/1}
}
.article-meta{font-size:12px;color:var(--text3);margin-bottom:6px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.read-stats{display:flex;gap:14px;align-items:center;font-size:12px;color:var(--text3)}
.read-stats span{display:inline-flex;align-items:center;gap:4px}
#readingProgress{position:fixed;top:0;left:250px;right:0;height:4px;background:var(--border);z-index:200}
#readingProgress .fill{height:100%;width:0%;background:var(--blue);transition:width .1s linear}
@media (max-width:900px){#readingProgress{left:0}}
.article-detail{display:none}
.article-detail.active{display:block}
.article-detail .back{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:var(--blue);cursor:pointer;margin-bottom:20px;text-decoration:none}
/* ── Notion (NotionNext) 匯出風格 — 全站文章預設套用 ── */
.article-detail .body{
  --notion-max-width:calc(720px + 2cm);
  max-width:var(--notion-max-width);
  margin:0 auto;
  font-family:'PingFang TC','Microsoft JhengHei','Noto Sans TC',-apple-system,BlinkMacSystemFont,'Noto Sans CJK TC',sans-serif;
  font-size:16px;
  line-height:1.5;
  color:var(--text);
}
@media (max-width:760px){
  .article-detail .body{max-width:calc(min(1920px,98vw))}
}
.article-detail .body p{line-height:2rem;margin-top:.75rem;margin-bottom:.75rem}
.article-detail .body h1{font-size:1.875em;margin-top:1.08em}
.article-detail .body h2{font-size:1.5em;margin-top:1.1em}
.article-detail .body h3,
.article-detail .body h4{font-size:1.25em;margin-top:1em}
.article-detail .body .step{display:flex;gap:14px;align-items:flex-start;margin:18px 0}
.article-detail .body .step .num{flex-shrink:0;width:40px;height:40px;border-radius:10px;background:var(--blue-bg);color:var(--blue);font-family:var(--font-serif);font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.article-detail .body .tip{background:var(--yellow-bg);border-radius:3px;padding:12px 16px;font-size:.88rem;color:var(--text);margin:10px 0}
.article-detail .body table{width:100%;border-collapse:collapse;margin:10px 0}
.article-detail .body th{text-align:left;padding:8px 10px;background:var(--bg3);color:var(--text2);font-weight:600;border:1px solid var(--border)}
.article-detail .body td{padding:8px 10px;border:1px solid var(--border)}
.article-detail .body .summary-box{background:var(--blue-bg);border-radius:3px;padding:16px 18px;margin:14px 0 24px}
.article-detail .body .summary-box .summary-title{font-weight:700;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.article-detail .body .summary-box ul{margin:0;padding-left:18px}
.article-detail .body .summary-box li{margin-bottom:4px}
.article-detail .body ul,.article-detail .body ol{margin:8px 0 14px 20px}
.article-detail .body li{margin-bottom:6px}
.article-detail .body a{color:var(--blue);text-decoration:underline}
.article-detail .body img{max-width:100%;display:block;margin:18px auto}
.article-detail .body .notion-asset-wrapper-image{max-width:100%}
.article-detail .body .notion-asset-wrapper-image>div{height:auto!important}
.article-detail .body .notion-asset-caption{font-size:14px;line-height:1.4;text-align:center;padding:6px 0 6px 2px;color:var(--text2)}
.article-detail .body .tip-box{border-radius:3px;padding:14px 16px;margin:16px 0;font-size:.9rem;line-height:1.7;display:flex;gap:8px;align-items:flex-start}
.article-detail .body .tip-goal{background:var(--blue-bg);color:var(--text)}
.article-detail .body .tip-info{background:var(--yellow-bg);color:var(--text)}
.article-detail .body .tip-warn{background:var(--red-bg);color:var(--text)}
.article-detail .body .tip-box.notion-gray_background_co{background:var(--bg3)}
.article-detail .body .notion-page-icon{width:24px;height:24px;flex-shrink:0;font-size:18px;line-height:24px;text-align:center}
.article-detail .body .step-block{margin:14px 0;padding-left:4px}
.article-detail .body .step-title{font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.article-detail .body .step-num{background:var(--blue);color:#fff;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:9999px;letter-spacing:.05em;white-space:nowrap}
.article-detail .body .step-done{background:var(--green-bg);color:var(--green);border-radius:8px;padding:8px 12px;font-size:.85rem;margin-top:6px;font-weight:600}
.article-detail .body .notion-table-of-contents{background-color:rgb(249,250,251);padding:.5rem;border-radius:6px}
.article-detail .body .notion-table-of-contents-item{font-size:15px;line-height:1.2}
@media (prefers-color-scheme:dark){
  .article-detail .body .notion-table-of-contents{background-color:rgb(17,24,39)}
}
.article-detail h1{font-family:var(--font-serif);font-size:1.8rem;font-weight:600;margin-bottom:8px}

/* ── About ── */
.about-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px 36px;max-width:760px}
.about-card h3{font-family:var(--font-serif);font-size:1.3rem;margin:28px 0 10px}
.about-card h3:first-child{margin-top:0}
.about-card p{color:var(--text2);font-size:.92rem;margin-bottom:12px;line-height:1.9}
.about-card ul{color:var(--text2);font-size:.92rem;margin:8px 0 14px 20px;line-height:1.9}
.about-card li{margin-bottom:6px}
.about-card a{color:var(--blue)}
.about-list{font-size:.9rem;color:var(--text2);line-height:2}

@media (max-width:900px){
  #sidebar{display:none}
  #main{margin-left:0;max-width:100vw;padding:24px}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<script>

// ═══════════════════════════════════════════════
const NAV=[
  {id:'overview',label:'首頁',icon:'⌂',type:'link'},
  {id:'articles',label:'文章專欄',icon:'▤',type:'accordion',children:[

  ]},

    {id:'tool-meeting',label:'會議追蹤工具',href:'會議追蹤工具.html'},
    {id:'tool-training',label:'教育訓練與證照管理',href:'教育訓練與證照管理系統.html'},
    {id:'tool-ghg',label:'溫室氣體盤查系統',href:'溫室氣體盤查系統.html'}

  {id:'tool-law',title:'法規登記系統',tags:[['法規管理','tag-blue'],['資料庫','tag-green']],
    desc:'集中管理適用法規清單，追蹤法規修訂與生效日期，建立可隨時查詢的法令資料庫，協助掌握法規異動狀況。',

  {id:'tool-training',title:'教育訓練與證照管理',tags:[['職安衛','tag-blue'],['教育訓練','tag-yellow']],
    desc:'管理人員教育訓練與法定證照紀錄，自動計算回訓到期日，並依事業單位類別與人數自動推算所需證照、時數與回訓週期。',

    href:'溫室氣體盤查系統.html',category:'esg'}

const ARTICLES=[
  {id:'a4',date:'2026-06-21',cover:'images/a4-mgmt-vs-bullying.png',tags:['職安衛','法規','不法侵害'],title:'不法侵害怎麼認定？7月1日職安法霸凌防治專章上路，企業該怎麼準備',
   excerpt:'從4個真實判決拆解「管理」與「霸凌」的法律界線，並解析7月1日起《職業安全衛生法》新增霸凌防治專章對企業申訴、調查機制的新要求，附法規連結與企業端SOP。',
   body:`<img src="images/a4-mgmt-vs-bullying.png" alt="合理管理 vs 職場霸凌">
   <div class="notion-asset-caption">合理管理與職場霸凌的法律界線示意圖</div>
   <div class="tip-box tip-goal">🎯 這篇文章帶你搞懂：法院怎麼判斷「管理權行使」與「職場霸凌」的界線、7月1日起職安法新增的霸凌防治專章對企業有什麼新義務，以及企業端可以照走的標準處理流程。</div>

   <p>不法侵害這件事，像是一條畫在地上、但肉眼看不見的界線——管理權跟霸凌站在同一條路上，差別只在於有沒有越線。問題是，企業往往要等到員工申訴、甚至上了法院，才發現自己已經踩過去了。</p>
   <p>員工申訴霸凌，不代表行為就一定違法；但企業也不能因此就什麼都不處理。這條界線該怎麼劃，連法院判決彼此之間都各有側重的角度。</p>
   <p>本文從 4 個真實判決拆解法院認定的核心邏輯，並解析 2026 年 7 月 1 日起上路的職安法霸凌防治專章，企業的申訴、調查機制該怎麼準備。</p>

   <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">

   <h4>一、不法侵害的法律定義</h4>
   <p>依《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=N0060001" target="_blank" rel="noopener">職業安全衛生法</a>》第 6 條第 2 項規定，雇主對於執行職務因他人行為遭受身體或精神不法侵害，應採取必要的預防措施。白話來說：<b>不是員工「覺得」被霸凌就成立</b>，而是行為要符合特定構成要件，這也是為什麼同樣是主管要求加班、調職，有些被法院認定是合理管理，有些卻被認定是霸凌。</p>

   <h4>二、法院怎麼判斷「管理」跟「霸凌」的界線？四個核心要件</h4>
   <p>整理近期判決可以發現，法院認定不法侵害通常會檢視以下四個要件：</p>
   <table>
     <tr><th>要件</th><th>檢視重點</th></tr>
     <tr><td><b>是否有敵意或惡意</b></td><td>主管是否基於敵視、討厭、歧視等目的</td></tr>
     <tr><td><b>是否持續反覆</b></td><td>單次衝突或單次嚴厲管理，通常不容易構成霸凌</td></tr>
     <tr><td><b>是否逾越社會通念</b></td><td>行為是否超過一般職場可接受的程度</td></tr>
     <tr><td><b>是否與管理目的有關</b></td><td>若基於工作需求、稽核、績效、紀律調整，較可能被認定為管理權行使</td></tr>
   </table>

   <div class="tip-box tip-info">💡 案例整理：以下案例參考自林裕老師（性騷擾調查/職場霸凌調查專業人才）公開彙整的判決重點，案號已附上方便自行查閱原始判決，正式法律行動仍建議委請專業律師核對判決全文。</div>

   </table>

   <h4>三、不一定構成霸凌的管理權行使 vs 高風險行為</h4>
   <table>
     <tr><th>不一定構成霸凌（多屬管理權）</th><th>可能構成霸凌（高風險）</th></tr>
     <tr><td>✅ 要求員工提交報告</td><td>❌ 針對特定人長期羞辱</td></tr>
     <tr><td>✅ 催促簽呈或預算資料</td><td>❌ 公開貶低人格</td></tr>
     <tr><td>✅ 要求交出稽核資料</td><td>❌ 故意孤立、排擠</td></tr>
     <tr><td>✅ 要求配合 PIP</td><td>❌ 不合理加重工作</td></tr>
     <tr><td>✅ 調動部門或工作內容</td><td>❌ 用歧視、敵意語言對待</td></tr>
     <tr><td>✅ 對違規行為約談、懲處</td><td>❌ 申訴後報復懲處</td></tr>
   </table>

   <h4>四、7 月 1 日起，職安法「霸凌防治專章」上路了什麼？</h4>
   <p>過去不法侵害預防主要依附在《職業安全衛生法》第 6 條的概括規定，具體預防措施則寫在《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=N0060009" target="_blank" rel="noopener">職業安全衛生設施規則</a>》第 324-3 條這個行政層級的規則裡，並沒有明確規定企業的申訴、調查程序。2026 年 7 月 1 日起，職安法新增「霸凌防治專章」，把不法侵害預防正式拉到法律層級，並依企業規模課予分級義務：</p>
   <table>
     <tr><th>企業規模</th><th>新增義務</th></tr>
     <tr><td>10 人以上</td><td>應建立申訴管道</td></tr>
     <tr><td>30 人以上</td><td>應訂定預防措施（書面計畫）</td></tr>
     <tr><td>100 人以上</td><td>應設置調查委員會</td></tr>
   </table>
   <div class="tip-box tip-warn">⚠️ 新制上路後罰鍰金額大幅提高，企業若未依規定建立申訴、調查機制，最高罰鍰可達 450 萬元。具體條文編號待行政院公告施行版本確定後可能調整，建議上路前直接查閱《<a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=N0060001" target="_blank" rel="noopener">職業安全衛生法</a>》最新版本確認條號。</div>

   <h4>五、企業端標準處理流程（SOP）</h4>
   <img src="images/a4-sop-7steps.png" alt="企業端標準處理流程 SOP 7步驟">
   <div class="notion-asset-caption">企業端標準處理流程（SOP）7 步驟</div>

   <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">

   <p>從這幾個判決可以看出一句貫穿全部案例的邏輯：<b>職場霸凌不是員工覺得委屈就成立，而是主管行為必須逾越合理管理界線</b>；但反過來，霸凌不成立也不代表行為就毫無問題，公審決字案就是最好的例子。</p>
   <p>7 月 1 日的修法把這條界線的責任更明確地交到企業手上——不是不能管理員工，而是管理行為要有合理理由、正當程序與完整紀錄。</p>
   <p>學會合法管理、理性管理、留痕管理，才能降低企業端的爭訟風險，同時也保護真正受到不法侵害的員工。</p>

   <div class="summary-box"><div class="summary-title">🎯 這篇文章的重點</div>
   <ul>
     <li>事業單位先分類（第一類／第二類／第三類），分類依據是「行業風險」，不是公司大小</li>
     <li>同一類事業，人數區間不同，應配置的業務主管／管理人員等級也不同</li>

     <li>規則文字很長，但拆成表格之後其實沒那麼可怕</li>
   </ul></div>

   <h4>一、先搞懂「事業單位分類」是怎麼分的</h4>
   <p>《職業安全衛生法施行細則》把所有行業依「危害風險程度」分成第一類、第二類、第三類事業，並由勞動部公告對照表，把每個行業的「行業標準分類代號」對應到這三類裡——也就是說，公司屬於哪一類，**第一步是去查自己登記的行業代號**，不是自己感覺風險高低，也不是看公司人數多寡。同一個人數規模，落在不同類別，配置義務完全不一樣。</p>

   <h4>二、三個類別分別長什麼樣子</h4>
   <table>
     <thead><tr><th>類別</th><th>風險定位</th><th>常見行業舉例</th></tr></thead>
     <tbody>
       <tr><td><strong>第一類</strong></td><td>高風險</td><td>製造業、營造業、礦業及土石採取業、農林漁牧業中的部分高風險作業</td></tr>
       <tr><td><strong>第二類</strong></td><td>中風險</td><td>一般製造業以外的工業、批發零售業、運輸倉儲業、住宿餐飲業</td></tr>
       <tr><td><strong>第三類</strong></td><td>低風險</td><td>金融保險業、不動產業、專業服務業（如會計師、律師事務所）、辦公室型服務業</td></tr>
     </tbody>
   </table>
   <div class="tip">📍 同樣是 150 人的公司，第一類事業要配置的人員規格，會比第三類事業嚴格不少——分類錯了，後面全部算錯，建議先用公司營業登記的行業代號去對照勞動部公告的分類表確認，不要憑感覺判斷。</div>

   <img src="images/a1-three-categories.png" alt="第一類、第二類、第三類事業示意圖">
   <div class="notion-asset-caption">第一類（製造業）、第二類（批發零售）、第三類（辦公室服務業）事業示意圖</div>

   <h4>三、第一類事業：100～300 人是關鍵卡點</h4>
   <p>以製造業這種第一類事業來說，依規模分級大致如下：</p>
   <ul>
     <li>未滿 30 人：置丙級業務主管 1 人</li>
     <li>30～100 人：乙級業務主管 1 人＋甲級業務主管 1 人</li>
     <li><strong>100～300 人</strong>：乙級業務主管 1 人＋甲級業務主管 1 人（不須專職），並設置「直接隸屬雇主」的一級管理單位</li>
     <li>300～500 人：再加 1 位甲級安全衛生管理師</li>
     <li>500 人以上：業務主管改為專職，且管理單位升級為專責一級管理單位</li>
   </ul>
   <p>人數一旦跨過某個門檻，規格就會往上跳一級——換句話說，公司每次擴編，職安衛配置都要重新對一次表，不是設定好就一輩子不用管。</p>

   <h4>四、第二類事業：門檻比第一類寬，但邏輯一樣</h4>
   <p>第二類事業（例如批發零售、住宿餐飲）風險中等，配置門檻會比第一類事業寬鬆，常見規則大致是：未滿 100 人置丙級業務主管；100～300 人升到乙級業務主管；300～500 人乙級＋甲級業務主管；500 人以上再加 1 位甲級安全衛生管理師。同樣的「人數變動就要重新對表」邏輯，在第二類事業一樣適用。</p>

   <h4>五、第三類事業：門檻最寬，但不是不用管</h4>
   <p>第三類事業（例如金融保險、辦公室型服務業）風險最低，門檻人數拉得最高：未滿 300 人只需丙級業務主管；300～1000 人才升到乙級業務主管；超過 1000 人才需要乙級＋甲級業務主管。門檻寬鬆不代表完全免責，只要超過門檻，一樣得照規定設置。</p>
   <div class="tip">📍 常見誤解：「我們是辦公室，不用管職安衛」。只要勞工人數夠多，第三類事業一樣有配置義務，只是門檻比製造業寬鬆很多，企業常常因為「自認低風險」而忽略這塊。</div>

   <p style="margin-top:24px">把這些區間整理成表格之後，其實邏輯不難，麻煩的是「每次人數變動、或不確定自己事業類別時都要重新查一次」。後來我把這套規則直接寫進「<a href="教育訓練與證照管理系統.html">教育訓練與證照管理系統</a>」工具裡——輸入事業類別與目前人數，系統會自動推算應配置的證照、人數與回訓週期，不用再每次翻法規對表。算是把這篇文章拆解的規則，變成可以重複使用的工具。</p>`},
  {id:'a2',date:'2026-06-10',cover:'images/a2-cover-godzilla.png',tags:['ESG','溫室氣體'],title:'中小企業做溫室氣體盤查，第一步該從哪裡開始？範疇一、二、三全解析',
   excerpt:'完全沒接觸過溫盤的新手也能看懂：用「邊、源、算、報、查」五個字，帶你走一遍溫室氣體盤查的完整流程。',
   body:`<img src="images/a2-cover-godzilla.png" alt="中小企業溫室氣體盤查 5步驟一次搞懂">
   <div class="notion-asset-caption">中小企業溫室氣體盤查「邊、源、算、報、查」5步驟</div>
   <p>每次客戶或主管問「我們公司要做溫室氣體盤查，要從哪裡開始」，我都看到對方臉上閃過一絲「這聽起來很麻煩」的表情。說實話，第一次聽到「範疇一、二、三」也覺得很難，但拆開來看，整個流程其實可以濃縮成 5 個字：<strong>邊、源、算、報、查</strong>。把這 5 個字記住，照順序做一遍，就是一次完整的溫盤。</p>

   <div class="summary-box"><div class="summary-title">🎯 這篇文章的重點</div>
   <ul>
     <li>溫盤不是先算數字，是先「畫邊界」決定算誰的</li>
     <li>範疇一二三分別對應「自己排放」「外購能源」「價值鏈間接排放」</li>
     <li>核心公式只有一個：活動量 × 排放係數 = 排放量</li>
     <li>第一次盤查不用急著做外部查證，先把內部資料庫建起來最重要</li>
   </ul></div>

   <div class="step"><div class="num">邊</div><div><h4 style="margin-top:0">畫邊界 — 先決定「算誰的」</h4>
   <p>第一步不是去算數字，而是先決定「這次盤查要算哪些範圍」，叫做<strong>組織邊界</strong>（公司有哪些廠區、辦公室都算進來）與<strong>營運邊界</strong>（要算到範疇一、二，還是連範疇三都算）。</p>
   <div class="tip">💡 新手常見誤解：以為要把「全世界跟公司有關的碳排放」都算進來。其實第一次盤查通常只先抓組織邊界內、自己能直接掌握數據的部分（範疇一、二），範疇三可以之後再逐步擴大。</div></div></div>

   <div class="step"><div class="num">源</div><div><h4 style="margin-top:0">找排放源 — 公司哪裡會排碳？</h4>
   <p>畫完邊界後，要逐一列出邊界內有哪些「會排放溫室氣體的活動」，並依照國際通用的「範疇」分類：</p>
   <table>
     <thead><tr><th>範疇</th><th>定義</th><th>生活化比喻</th><th>常見例子</th></tr></thead>
     <tbody>
       <tr><td><strong>範疇一</strong></td><td>公司自己直接排放</td><td>自己的車自己加的油</td><td>公司自有車輛燃油、鍋爐燃燒、滅火器逸散</td></tr>
       <tr><td><strong>範疇二</strong></td><td>外購能源間接排放</td><td>家裡每月的電費單</td><td>外購電力、外購蒸氣／冷氣</td></tr>
       <tr><td><strong>範疇三</strong></td><td>價值鏈其他間接排放</td><td>買東西時，背後藏的碳足跡</td><td>員工通勤、商務出差、原物料採購、廢棄物處理</td></tr>
     </tbody>
   </table>
   <div class="tip">💡 新手小提醒：範疇一、二是「公司自己能控制」的部分，建議第一次盤查先把這兩塊做好做滿；範疇三項目多又難蒐集，可以排在進階階段再補。</div></div></div>

   <div class="step"><div class="num">算</div><div><h4 style="margin-top:0">算排放量 — 一個公式套到底</h4>
   <p>找到排放源後，計算方式幾乎都是同一個公式：</p>
   <p style="text-align:center;font-family:var(--mono);font-size:1.05rem;background:var(--bg3);padding:14px;border-radius:10px">活動量 × 排放係數 = 溫室氣體排放量（CO2e）</p>
   <p>用加油站比喻最好懂：「加了多少升油（活動量）」乘上「每升油會排多少碳（排放係數，環保署有公告固定數值）」，就等於這次加油實際排放的碳量。電費單也是同樣道理：用了多少度電，乘上台電的「電力排放係數」，就是這個月用電產生的碳排放。</p>
   <div class="tip">💡 排放係數不用自己估算，環境部「溫室氣體排放係數管理表」每年都會公告最新版本，直接查表代入公式即可。</div></div></div>

   <div class="step"><div class="num">報</div><div><h4 style="margin-top:0">報告登錄 — 讓數字正式生效</h4>
   <p>算出各排放源的數值後，要彙整成正式的「溫室氣體排放清冊報告」，並依規定登錄到主管機關指定的平台（如環境部溫室氣體排放量資訊平台），逾規定門檻的事業單位需依法申報。</p>
   <div class="tip">💡 即使公司目前還沒被強制要求申報，先建立內部報告格式與資料庫，未來法規擴大適用範圍或客戶要求 ESG 數據時就不會手忙腳亂。</div></div></div>

   <div class="step"><div class="num">查</div><div><h4 style="margin-top:0">第三方查驗 — 讓數字被外部相信</h4>
   <p>最後一步是請第三方驗證機構（如 SGS、BSI 等）依照 ISO 14064-1 等標準，對盤查結果進行查證，確認數據的計算邏輯與來源證據都經得起檢驗。</p>
   <p>查證後取得的「查驗聲明書」，是企業對外（客戶、投資人、主管機關）證明碳排放數據可信度的關鍵文件，也是申請碳權、迴應供應鏈查核時的必備材料。</p>
   <div class="tip">💡 第一次盤查不一定要馬上做外部查證，可以先完成內部盤查、累積 1～2 年數據後再尋求查證，逐步走完整套流程。</div></div></div>

   <p style="margin-top:24px">把「邊、源、算、報、查」這 5 個步驟走完一輪，就是一次完整的溫室氣體盤查。本系統的「<a href="溫室氣體盤查系統.html">溫室氣體盤查系統</a>」工具，已將範疇一～三的資料登錄與彙整介面準備好，協助企業從零開始逐步建立可追蹤的碳排放資料庫。</p>`},
  {id:'a3',date:'2026-06-01',cover:'images/a3-cover-godzilla.png',tags:['AI','職安衛'],title:'用 AI 協助職安衛文件管理：從手動到自動化的轉變',
   excerpt:'說實話，職安衛最花時間的從來不是「懂法規」，而是「每個月重複對表」。把規則寫進系統之後，這件事終於不用再手動做了。',
   body:`<img src="images/a3-cover-godzilla.png" alt="用AI協助職安衛文件管理：從手動到自動化的轉變">
   <div class="notion-asset-caption">職安衛文件管理：從手動比對到 AI 自動化的轉變</div>
   <p>講個老實話：職安衛這個工作，難的從來不是看懂法規條文，而是「每個月都要重複做一次同樣的比對」——這個人的證照是不是要到期了、這個月的會議紀錄誰還沒簽核、公司人數變動了配置夠不夠。一開始我也是滿桌子的證照清單、訓練紀錄、會議紀錄三個資料夾，外加一台快被我按壞的計算機，每次要查證照到期日都要把三個資料夾全部翻一遍。後來忍不住把整套邏輯寫成系統，這篇就是整理這段「從手忙腳亂到自動化」的轉變過程。</p>

   <div class="summary-box"><div class="summary-title">🎯 這篇文章的重點</div>
   <ul>
     <li>職安衛的痛點不是「不懂法規」，而是「重複比對太耗時」</li>
     <li>把法規規則（門檻人數、回訓週期、訓練時數）寫成資料表，就能讓系統自動算</li>
     <li>從「人工查表」變成「輸入資料 → 系統跳出建議」，是這次自動化的核心轉變</li>
     <li>自動化不是取代判斷，是把「重複計算」的部分交出去，人力留給真正需要判斷的事</li>
   </ul></div>

   <h4>一、轉變前：三本資料夾、一台計算機、滿桌便利貼</h4>
   <p>轉變之前的日常大概是這樣：證照清單一本、訓練紀錄一本、會議紀錄一本，旁邊貼著「證照到期？」「訓練時數比對⋯」「會議紀錄誰還沒簽？」的便利貼提醒自己。職安衛日常會反覆碰到三件事——法規異動要比對、證照到期要追蹤、會議決議要持續追蹤執行進度。這些事情單獨看都不難，難的是「量大又重複」：人員一多、證照種類一多，光是對表就佔掉大半天，更別說還要記得每隔幾年法規會修一次，記憶力再好也扛不住。</p>

   <h4>二、轉變後：輸入資料，系統直接告訴你答案</h4>
   <p>後來的做法很單純：把職安衛規則拆成可以查表的資料，而不是記在自己腦子裡或散落在各個 Excel 分頁，例如：</p>
   <ul>
     <li>不同事業類別、不同人數區間，應配置的業務主管／管理人員等級（門檻規則）</li>
     <li>每種證照的回訓週期與初訓／回訓時數（時數規則）</li>
     <li>會議追蹤的待辦事項與結案狀態（流程規則）</li>
   </ul>
   <p>把這些規則寫進系統之後，使用情境就從「我要去查法規、算人數」變成「我輸入目前人數跟類別，系統直接告訴我需要哪些證照、什麼時候要回訓」。下面這張對照表，大概是這次轉變最直接的感受：</p>
   <table>
     <thead><tr><th>項目</th><th>手動管理時期</th><th>AI 自動化管理之後</th></tr></thead>
     <tbody>
       <tr><td>證照到期</td><td>翻證照清單，自己算還剩幾天</td><td>系統依到期日自動跳出「30 天後到期」提醒</td></tr>
       <tr><td>訓練時數</td><td>對著訓練紀錄本逐筆加總</td><td>進度條直接顯示「已完成 80%」，一眼看完</td></tr>
       <tr><td>會議追蹤</td><td>翻會議紀錄找誰還沒簽、哪些還沒結案</td><td>待辦事項／已結案狀態自動分類顯示</td></tr>
     </tbody>
   </table>
   <div class="tip">📍 這裡的「AI」不是指要多花錢買大模型 API，而是用簡單的規則引擎（if 人數在這個區間 → 配置這些人員）就能解決大部分日常重複比對的問題，成本反而低，這也是為什麼這套工具可以完全跑在瀏覽器裡，不需要額外的伺服器費用。</div>

   <h4>三、實際案例：證照回訓提醒怎麼運作</h4>
   <p>以「<a href="教育訓練與證照管理系統.html">教育訓練與證照管理系統</a>」這個工具為例：選擇證照項目後，系統會自動帶入該證照的初訓時數與回訓週期，新增紀錄時也會自動算出下次回訓日，並依「即將到期」「已過期」分類提醒——不用再靠人工記憶或另開提醒表，更不用在桌上貼滿便利貼。</p>

   <h4>四、自動化不是偷懶，是把腦力留給真正需要判斷的事</h4>
   <p>這套轉變最讓我有感的地方，其實不是「省了多少時間」，而是發現自己終於不用把腦容量耗在「記得要去查表」這件事上。法規條文怎麼解讀、員工的個案怎麼處理，這些才是真正需要人去判斷的事；至於「這個人的證照還有幾天到期」，本來就不該占用人腦的記憶體。</p>

   <p style="margin-top:24px">這也是本作品集所有工具背後共同的設計理念：把「規則」寫進系統，把「重複的計算與比對」交給工具，人力留下來處理真正需要判斷與溝通的事情。法規不會自己變簡單，但至少對表這件事，可以不用再靠人腦了。</p>`}

let currentSection='overview';
let currentArticle=null;

function goHome(){currentSection='overview';currentArticle=null;renderNav();renderMain();window.scrollTo(0,0);}

function shortLabel(label){
  const trimmed=label.replace(/^[\s　]+/,'');
  return trimmed.charAt(0)||'•';
}
function toggleSidebar(){
  document.body.classList.toggle('sidebar-collapsed');
  localStorage.setItem('sidebarCollapsed',document.body.classList.contains('sidebar-collapsed')?'1':'0');
}
if(localStorage.getItem('sidebarCollapsed')==='1')document.body.classList.add('sidebar-collapsed');

let expandedNav={articles:currentSection.startsWith('articles-'),tools:false};
function toggleNavGroup(id){
  expandedNav[id]=!expandedNav[id];
  renderNav();
}
function renderNav(){
  const el=document.getElementById('nav');
  el.innerHTML='';
  NAV.forEach(item=>{
    if(item.type==='link'){
      const btn=document.createElement('button');
      btn.className='sb-btn'+(currentSection===item.id?' active':'');
      btn.title=item.label;
      btn.innerHTML=`<span class="sb-icon">${item.icon}</span><span class="label-full">${item.label}</span>`;
      btn.onclick=()=>{currentSection=item.id;currentArticle=null;renderNav();renderMain();};
      el.appendChild(btn);
      return;
    }
    const isOpen=!!expandedNav[item.id];
    const head=document.createElement('button');
    head.className='sb-btn sb-acc-head'+(isOpen?' open':'');
    head.title=item.label;
    head.innerHTML=`<span class="sb-icon">${item.icon}</span><span class="label-full">${item.label}</span><span class="label-full sb-chevron">›</span>`;
    head.onclick=()=>{
      if(document.body.classList.contains('sidebar-collapsed')){toggleSidebar();expandedNav[item.id]=true;renderNav();return;}
      toggleNavGroup(item.id);
    };
    el.appendChild(head);
    const wrap=document.createElement('div');
    wrap.className='sb-acc-body'+(isOpen?' open':'');
    item.children.forEach(child=>{
      if(child.href){
        const a=document.createElement('a');
        a.className='sb-btn sb-sub';
        a.href=child.href;
        a.title=child.label;
        a.innerHTML=`<span class="label-full">${child.label}</span><span class="label-short">${shortLabel(child.label)}</span>`;
        wrap.appendChild(a);
      }else{
        const btn=document.createElement('button');
        btn.className='sb-btn sb-sub'+(currentSection===child.id?' active':'');
        btn.title=child.label;
        btn.innerHTML=`<span class="label-full">${child.label}</span><span class="label-short">${shortLabel(child.label)}</span>`;
        btn.onclick=()=>{currentSection=child.id;currentArticle=null;renderNav();renderMain();};
        wrap.appendChild(btn);
      }
    });
    el.appendChild(wrap);
  });
}

function toolCard(t){
  return`<a class="card${t.category==='esg'?' cat-esg':''}" href="${t.href}">
    <div class="tags">${t.tags.map(([label,cls])=>`<span class="${cls}">${label}</span>`).join('')}</div>
    <h3>${t.title}</h3>
    <p class="desc">${t.desc}</p>
    <div class="footer-row">
      <span class="status"><span class="dot"></span> 已上線</span>
      <span class="link">前往使用 →</span>
    </div>
  </a>`;
}

function readStats(a){
  const text=a.body.replace(/<[^>]*>/g,'');
  const words=text.replace(/\s+/g,'').length;
  const minutes=Math.max(1,Math.round(words/300));
  return{words,minutes};
}
function setupReadingProgress(){
  const bar=document.getElementById('readingProgress');
  bar.style.display='block';
  const fill=bar.querySelector('.fill');
  function update(){
    const max=document.documentElement.scrollHeight-window.innerHeight;
    const pct=max>0?Math.min(100,Math.max(0,(window.scrollY/max)*100)):0;
    fill.style.width=pct+'%';
  }
  window.removeEventListener('scroll',window._readingProgressHandler||(()=>{}));
  window._readingProgressHandler=update;
  window.addEventListener('scroll',update);
  update();
}
function hideReadingProgress(){
  const bar=document.getElementById('readingProgress');
  bar.style.display='none';
  window.removeEventListener('scroll',window._readingProgressHandler||(()=>{}));
}

  if(currentSection==='overview'){

      </div>
      <div class="metric-grid">
        <div class="metric-card"><div class="metric-label">已上線工具</div><div class="metric-value">${TOOLS.length}</div><div class="metric-unit">項</div></div>

        <div class="metric-card"><div class="metric-label">ESG / 永續工具</div><div class="metric-value">${TOOLS.filter(t=>t.category==='esg').length}</div><div class="metric-unit">項</div></div>
        <div class="metric-card"><div class="metric-label">文章篇數</div><div class="metric-value">${ARTICLES.length}</div><div class="metric-unit">篇</div></div>
      </div>

  }

  if(currentSection==='osh'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag tag-blue">職業安全衛生</span>
        <h1>職業安全衛生工具</h1>
        <p>涵蓋法規管理、會議追蹤與教育訓練／證照管理，協助企業掌握法規異動、追蹤會議決議並自動規劃證照回訓。</p>
      </div>
      <div class="grid">${TOOLS.filter(t=>t.category==='osh').map(toolCard).join('')}</div>`;
    return;
  }

  if(currentSection==='esg'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag tag-green">永續 ／ ESG</span>
        <h1>永續 ／ ESG 工具</h1>
        <p>協助企業彙整溫室氣體排放數據，建立可追蹤的碳盤查資料庫，作為 ESG 報告與淨零規劃的基礎。</p>
      </div>
      <div class="grid">${TOOLS.filter(t=>t.category==='esg').map(toolCard).join('')}</div>`;
    return;
  }

  if(currentSection.startsWith('articles-')){
    const tag=currentSection.replace('articles-','');
    const navItem=NAV.flatMap(g=>g.children||[]).find(i=>i.id===currentSection);
    const filtered=ARTICLES.filter(a=>a.tags.includes(tag));
    if(currentArticle){
      const a=ARTICLES.find(x=>x.id===currentArticle);
      const rs=readStats(a);
      main.innerHTML=`
        <div class="article-detail active">
          <a class="back" onclick="backToArticles()">← 返回「${navItem?navItem.label:tag}」文章列表</a>

          <div class="body" style="margin-top:18px">${a.body}</div>

      setupReadingProgress();

    }
    main.innerHTML=`

  }

  if(currentSection==='about'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag">關於</span>
        <h1>關於我</h1>
        <p>嗨，我是 Oscar。歡迎來到這裡。</p>
      </div>
      <div class="about-card">
        <p>這個網站主要記錄我在<strong>職業安全衛生、環境與永續資料整理、流程優化，以及 AI 工具應用</strong>上的學習、實作與整理。</p>
        <p>我一直對一件事很有興趣。那些原本很繁瑣、很依賴人工、很容易因為經驗差異而做法不一致的工作，有沒有可能被整理得更清楚一些？</p>
        <p>有沒有可能透過流程設計、數位工具，甚至 AI 的協助，讓事情變得更有效率、更穩定，也更容易交接與延續？</p>
        <p>這個網站，就是我一路摸索這些問題的過程記錄。</p>
        <p>如果你也對職安衛管理、ESG、行政流程優化、自動化工具有興趣，或正在思考怎麼把工作做得更系統化，這裡也許會對你有幫助。</p>

        <h3>我是誰</h3>
        <p>我是在補教業累積多年經驗後，於 2025 年轉職，開始走向職業安全衛生與 ESG 永續相關工作。</p>
        <p>進入這個領域之後，我很快就發現，很多流程仍然高度依賴紙本與人工整理。資料分散、表單繁多、紀錄方式不一致。平常看起來好像都能運作，但真正到了要追蹤、查找、統整或交接的時候，往往就會變得很凌亂。</p>
        <p>也因為這樣，我開始持續思考：這些制度和流程，有沒有可能被整理得更清楚一些？有沒有可能透過更好的結構、規則設計與數位工具，讓原本繁瑣的工作變得更穩定、更有效率，也更容易延續？</p>
        <p>所以我開始把這些工作拆解成可以被理解、被標準化、被優化的部分。有些透過表單整理，有些透過規則梳理，有些用前端小工具實作，也有些會嘗試結合 AI，來減少重複性的行政處理。</p>
        <p>我不是科班出身的工程師，也不是單純為了展示技術而做工具的人。比起做一個「看起來很厲害」的系統，我更在意的是：這個東西能不能真正解決問題。</p>

        <h3>為什麼寫這些</h3>

function articleCard(a){
  const cover=a.cover||'';
  return`<div class="article-card" data-id="${a.id}">
    <div class="article-card-cover">${cover?`<img src="${cover}" alt="${esc(a.title)}" loading="lazy">`:''}</div>
    <div class="article-card-body">
      <div class="meta">${esc(a.tags[0]||'')}　•　${a.date}</div>
      <h3>${esc(a.title)}</h3>
      <p class="desc">${esc(a.excerpt)}</p>
      <div class="tags">${a.tags.map(t=>`<span>#${esc(t)}</span>`).join('')}</div>
      <span class="read-more">閱讀全文 →</span>
    </div>
  </div>`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function bindArticleClicks(){
  document.querySelectorAll('.article-card').forEach(el=>{
    el.onclick=()=>{
      const id=el.getAttribute('data-id');
      const a=ARTICLES.find(x=>x.id===id);
      if(!currentSection.startsWith('articles-')){
        const matchedTag=a.tags.find(t=>NAV.flatMap(g=>g.children||[]).some(i=>i.id==='articles-'+t));
        currentSection='articles-'+(matchedTag||a.tags[0]);
      }
      currentArticle=id;
      renderNav();renderMain();window.scrollTo(0,0);
    };
  });
}
function backToArticles(){currentArticle=null;renderMain();window.scrollTo(0,0);}

renderNav();
renderMain();
