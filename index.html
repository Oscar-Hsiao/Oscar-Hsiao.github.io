<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscar 的專案管理</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #252840;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --green: #10b981;
    --yellow: #f59e0b;
    --blue: #3b82f6;
    --border: rgba(255,255,255,0.07);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a1d2e 0%, #252840 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
  }
  .header-left h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
  .header-left h1 span { color: var(--accent); }
  .header-left p { color: var(--text2); font-size: 0.85rem; margin-top: 2px; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #7c73ff; transform: translateY(-1px); }
  .btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  /* STATS */
  .stats-bar {
    display: flex; gap: 24px; padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(26,29,46,0.5);
  }
  .stat { text-align: center; }
  .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: var(--text2); margin-top: 2px; }

  /* FILTERS */
  .filters { display: flex; gap: 10px; padding: 20px 40px; flex-wrap: wrap; align-items: center; }
  .filter-input {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; width: 240px;
    outline: none; transition: border 0.2s;
  }
  .filter-input:focus { border-color: var(--accent); }
  .filter-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
  .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; padding: 20px 40px 60px; }

  /* CARD */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; transition: all 0.25s; position: relative; overflow: hidden;
  }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); opacity: 0; transition: opacity 0.25s; }
  .card:hover { transform: translateY(-4px); border-color: rgba(108,99,255,0.3); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .card:hover::before { opacity: 1; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-title { font-size: 1rem; font-weight: 700; line-height: 1.4; flex: 1; }
  .status-badge {
    font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; margin-left: 10px;
  }
  .status-completed { background: rgba(16,185,129,0.15); color: var(--green); }
  .status-in_progress { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .status-planning { background: rgba(59,130,246,0.15); color: var(--blue); }

  .card-date { font-size: 0.78rem; color: var(--text2); margin-bottom: 10px; }
  .card-desc { font-size: 0.85rem; color: var(--text2); line-height: 1.6; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .tag { font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; background: var(--surface2); color: var(--text2); }
  .tool-tag { background: rgba(108,99,255,0.15); color: #a5a0ff; }

  .card-links { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .link-btn {
    font-size: 0.78rem; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    transition: all 0.2s; cursor: pointer;
  }
  .link-btn:hover { border-color: var(--accent); color: var(--accent); }
  .link-btn.live { border-color: rgba(16,185,129,0.4); color: var(--green); }
  .link-btn.live:hover { background: rgba(16,185,129,0.1); }

  .card-admin-actions { display: none; gap: 8px; padding-top: 14px; border-top: 1px solid var(--border); }
  .admin-mode .card-admin-actions { display: flex; }

  .card-notes {
    display: none; font-size: 0.78rem; color: var(--text2); background: var(--surface2);
    border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; white-space: pre-wrap; line-height: 1.6;
  }
  .admin-mode .card-notes { display: block; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 32px; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.82rem; color: var(--text2); margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 8px; font-size: 0.85rem; outline: none; transition: border 0.2s;
    font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { min-height: 80px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

  /* LOGIN MODAL */
  .login-modal { max-width: 360px; text-align: center; }
  .login-modal h2 { margin-bottom: 8px; }
  .login-modal p { color: var(--text2); font-size: 0.85rem; margin-bottom: 24px; }
  .login-modal input { text-align: center; letter-spacing: 2px; }

  /* ADMIN BAR */
  .admin-bar {
    display: none; background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(108,99,255,0.05));
    border-bottom: 1px solid rgba(108,99,255,0.3); padding: 10px 40px;
    align-items: center; justify-content: space-between;
  }
  .admin-mode .admin-bar { display: flex; }
  .admin-bar-label { font-size: 0.82rem; color: var(--accent); font-weight: 600; display: flex; align-items: center; gap: 6px; }

  /* EMPTY */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state div { font-size: 3rem; margin-bottom: 12px; }

  /* LOG MODAL */
  .log-content { white-space: pre-wrap; font-size: 0.78rem; color: var(--text2); line-height: 1.7; max-height: 60vh; overflow-y: auto; background: var(--surface2); padding: 16px; border-radius: 8px; }

  @media (max-width: 600px) {
    header, .stats-bar, .filters, .grid { padding-left: 16px; padding-right: 16px; }
    .grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .admin-bar { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Oscar 的<span>專案庫</span></h1>
    <p>記錄每一個做過的東西</p>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost" id="loginBtn" onclick="openLogin()">🔐 管理者登入</button>
    <button class="btn btn-danger" id="logoutBtn" onclick="logout()" style="display:none">登出</button>
  </div>
</header>

<div class="admin-bar">
  <div class="admin-bar-label">🛠️ 管理模式啟用中 — 可新增、編輯、刪除專案</div>
  <button class="btn btn-primary" onclick="openAddModal()">＋ 新增專案</button>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="filters">
  <input class="filter-input" type="text" id="searchInput" placeholder="搜尋專案名稱或標籤…" oninput="renderProjects()">
  <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">全部</button>
  <button class="filter-btn" data-filter="completed" onclick="setFilter(this,'completed')">已完成</button>
  <button class="filter-btn" data-filter="in_progress" onclick="setFilter(this,'in_progress')">進行中</button>
  <button class="filter-btn" data-filter="planning" onclick="setFilter(this,'planning')">規劃中</button>
</div>

<div class="grid" id="projectGrid"></div>

<!-- LOGIN -->
<div class="overlay" id="loginOverlay">
  <div class="modal login-modal">
    <h2>🔐 管理者登入</h2>
    <p>輸入密碼以進入管理模式</p>
    <div class="form-group">
      <input type="password" id="pwInput" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="loginError" style="color:#ef4444;font-size:0.82rem;margin-bottom:12px;display:none">密碼錯誤</div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeOverlay('loginOverlay')">取消</button>
      <button class="btn btn-primary" onclick="doLogin()">登入</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT PROJECT -->
<div class="overlay" id="projectModal">
  <div class="modal">
    <h2 id="modalTitle">新增專案</h2>
    <input type="hidden" id="editId">
    <div class="form-row">
      <div class="form-group">
        <label>專案名稱 *</label>
        <input type="text" id="fName" placeholder="例：法規鑑別清單系統">
      </div>
      <div class="form-group">
        <label>日期 *</label>
        <input type="date" id="fDate">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>狀態</label>
        <select id="fStatus">
          <option value="completed">✅ 已完成</option>
          <option value="in_progress">🔄 進行中</option>
          <option value="planning">📋 規劃中</option>
        </select>
      </div>
      <div class="form-group">
        <label>對話記錄檔案名稱</label>
        <input type="text" id="fLog" placeholder="例：法規鑑別清單系統_對話記錄.md">
      </div>
    </div>
    <div class="form-group">
      <label>專案描述</label>
      <textarea id="fDesc" placeholder="這個專案做了什麼？解決了什麼問題？"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>網站連結</label>
        <input type="url" id="fLive" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>GitHub Repo</label>
        <input type="url" id="fGithub" placeholder="https://github.com/...">
      </div>
    </div>
    <div class="form-group">
      <label>使用工具（逗號分隔）</label>
      <input type="text" id="fTools" placeholder="HTML, JavaScript, GitHub Pages">
    </div>
    <div class="form-group">
      <label>標籤（逗號分隔）</label>
      <input type="text" id="fTags" placeholder="職安衛, 法規管理, 公信電子">
    </div>
    <div class="form-group">
      <label>備註（只有管理者可見）</label>
      <textarea id="fNotes" placeholder="密碼、待辦事項、補充說明…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('projectModal')">取消</button>
      <button class="btn btn-primary" onclick="saveProject()">儲存</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="overlay" id="confirmModal">
  <div class="modal" style="max-width:360px;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:12px">🗑️</div>
    <h2 style="margin-bottom:8px">確認刪除？</h2>
    <p style="color:var(--text2);font-size:0.85rem;margin-bottom:24px">此操作無法復原</p>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-ghost" onclick="closeOverlay('confirmModal')">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">確認刪除</button>
    </div>
  </div>
</div>

<!-- LOG VIEWER -->
<div class="overlay" id="logModal">
  <div class="modal" style="max-width:700px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 id="logModalTitle">對話記錄</h2>
      <button class="btn btn-ghost" onclick="closeOverlay('logModal')">✕</button>
    </div>
    <div class="log-content" id="logContent">載入中…</div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const ADMIN_HASH = '2afb5c2cbd67ce59a9a89b0adc501754a23333a2b08c2eecf94e7d62ba4bc8d1';

const DEFAULT_PROJECTS = [
  {
    id: 1,
    name: "公信電子法規鑑別清單管理系統",
    date: "2026-06-11",
    description: "基於115公信電子法規鑑別清單.xls，建立線上法規鑑別清單管理系統。三個分頁（職業安全衛生、ISO 45001、ISO 14001），共77筆法規，每條連結至全國法規資料庫，設有管理者登入機制。",
    status: "completed",
    liveUrl: "https://oscar-hsiao.github.io/law-registry/",
    githubUrl: "https://github.com/Oscar-Hsiao/law-registry",
    tools: ["HTML", "JavaScript", "GitHub Pages", "全國法規資料庫 API"],
    tags: ["職安衛", "ISO 45001", "ISO 14001", "公信電子", "法規管理"],
    logFile: "法規鑑別清單系統_對話記錄.md",
    notes: "管理者密碼：ji394su3\nGAS 後端自動更新待設定（GAS_URL 需填入後才能自動查修正日期）\n全部 PCode 已逐一驗證"
  }
];

let projects = JSON.parse(localStorage.getItem('oscar_projects') || 'null') || DEFAULT_PROJECTS;
let isAdmin = false;
let currentFilter = 'all';
let deleteTargetId = null;

function save() { localStorage.setItem('oscar_projects', JSON.stringify(projects)); }

// ─── AUTH ────────────────────────────────────────────────────────────────────
function openLogin() { document.getElementById('loginOverlay').classList.add('open'); setTimeout(() => document.getElementById('pwInput').focus(), 100); }
async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  const hash = Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2,'0')).join('');
  if (hash === ADMIN_HASH) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('logoutBtn').style.display = '';
    closeOverlay('loginOverlay');
    document.getElementById('pwInput').value = '';
    document.getElementById('loginError').style.display = 'none';
    renderProjects();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function logout() {
  isAdmin = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('loginBtn').style.display = '';
  document.getElementById('logoutBtn').style.display = 'none';
  renderProjects();
}

// ─── FILTER ──────────────────────────────────────────────────────────────────
function setFilter(btn, f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProjects();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const STATUS_LABEL = { completed: '已完成', in_progress: '進行中', planning: '規劃中' };

function renderStats() {
  const total = projects.length;
  const completed = projects.filter(p => p.status === 'completed').length;
  const inProgress = projects.filter(p => p.status === 'in_progress').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">全部專案</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--green)">${completed}</div><div class="stat-label">已完成</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--yellow)">${inProgress}</div><div class="stat-label">進行中</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--blue)">${projects.filter(p=>p.status==='planning').length}</div><div class="stat-label">規劃中</div></div>
  `;
}

function renderProjects() {
  renderStats();
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = projects.filter(p => {
    const matchFilter = currentFilter === 'all' || p.status === currentFilter;
    const matchSearch = !q || p.name.toLowerCase().includes(q) ||
      (p.tags || []).some(t => t.toLowerCase().includes(q)) ||
      (p.tools || []).some(t => t.toLowerCase().includes(q)) ||
      (p.description || '').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  const grid = document.getElementById('projectGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><div>📭</div>沒有符合條件的專案</div>';
    return;
  }

  grid.innerHTML = list.map(p => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${p.name}</div>
        <span class="status-badge status-${p.status}">${STATUS_LABEL[p.status]}</span>
      </div>
      <div class="card-date">📅 ${p.date}</div>
      <div class="card-desc">${p.description || ''}</div>
      ${p.notes ? `<div class="card-notes">📝 備註\n${p.notes}</div>` : ''}
      <div class="card-tags">
        ${(p.tools||[]).map(t=>`<span class="tag tool-tag">⚙️ ${t}</span>`).join('')}
        ${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
      <div class="card-links">
        ${p.liveUrl ? `<a class="link-btn live" href="${p.liveUrl}" target="_blank">🌐 網站</a>` : ''}
        ${p.githubUrl ? `<a class="link-btn" href="${p.githubUrl}" target="_blank">📦 GitHub</a>` : ''}
        ${p.logFile ? `<button class="link-btn" onclick="viewLog(${p.id})">📄 對話記錄</button>` : ''}
      </div>
      <div class="card-admin-actions">
        <button class="btn btn-ghost" style="font-size:0.8rem;padding:6px 14px" onclick="openEditModal(${p.id})">✏️ 編輯</button>
        <button class="btn btn-danger" style="font-size:0.8rem;padding:6px 14px" onclick="deleteProject(${p.id})">🗑️ 刪除</button>
      </div>
    </div>
  `).join('');
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

function openAddModal() {
  document.getElementById('modalTitle').textContent = '新增專案';
  document.getElementById('editId').value = '';
  ['fName','fDesc','fLive','fGithub','fTools','fTags','fNotes','fLog'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('fStatus').value = 'in_progress';
  document.getElementById('projectModal').classList.add('open');
}

function openEditModal(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = '編輯專案';
  document.getElementById('editId').value = id;
  document.getElementById('fName').value = p.name || '';
  document.getElementById('fDate').value = p.date || '';
  document.getElementById('fStatus').value = p.status || 'in_progress';
  document.getElementById('fDesc').value = p.description || '';
  document.getElementById('fLive').value = p.liveUrl || '';
  document.getElementById('fGithub').value = p.githubUrl || '';
  document.getElementById('fTools').value = (p.tools || []).join(', ');
  document.getElementById('fTags').value = (p.tags || []).join(', ');
  document.getElementById('fNotes').value = p.notes || '';
  document.getElementById('fLog').value = p.logFile || '';
  document.getElementById('projectModal').classList.add('open');
}

function saveProject() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('請填寫專案名稱'); return; }
  const data = {
    name,
    date: document.getElementById('fDate').value,
    status: document.getElementById('fStatus').value,
    description: document.getElementById('fDesc').value.trim(),
    liveUrl: document.getElementById('fLive').value.trim(),
    githubUrl: document.getElementById('fGithub').value.trim(),
    tools: document.getElementById('fTools').value.split(',').map(s=>s.trim()).filter(Boolean),
    tags: document.getElementById('fTags').value.split(',').map(s=>s.trim()).filter(Boolean),
    notes: document.getElementById('fNotes').value.trim(),
    logFile: document.getElementById('fLog').value.trim(),
  };
  const editId = document.getElementById('editId').value;
  if (editId) {
    const idx = projects.findIndex(p => p.id == editId);
    if (idx >= 0) projects[idx] = { ...projects[idx], ...data };
  } else {
    data.id = Date.now();
    projects.unshift(data);
  }
  save();
  closeOverlay('projectModal');
  renderProjects();
}

function deleteProject(id) { deleteTargetId = id; document.getElementById('confirmModal').classList.add('open'); }
function confirmDelete() {
  projects = projects.filter(p => p.id !== deleteTargetId);
  save(); closeOverlay('confirmModal'); renderProjects();
}

// ─── LOG VIEWER ──────────────────────────────────────────────────────────────
function viewLog(id) {
  const p = projects.find(x => x.id === id);
  if (!p || !p.logFile) return;
  document.getElementById('logModalTitle').textContent = p.logFile;
  document.getElementById('logModal').classList.add('open');
  document.getElementById('logContent').textContent = '（對話記錄儲存在本機，請用文字編輯器開啟檔案：' + p.logFile + '）\n\n此檢視器顯示說明。實際記錄可在 Claude Cowork 的輸出資料夾中找到。';
}

// ─── CLOSE ON BACKDROP ───────────────────────────────────────────────────────
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ─── INIT ────────────────────────────────────────────────────────────────────
renderProjects();
</script>
</body>
</html>
