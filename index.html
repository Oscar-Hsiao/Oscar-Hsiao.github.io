<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscar Hsiao — 職安 × AI × 永續</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
  <div class="sb-logo">
    <button class="sb-toggle" onclick="toggleSidebar()" title="收起／展開選單">‹</button>
    <div style="cursor:pointer" onclick="goHome()">
      <div class="sb-brand">Oscar Hsiao</div>
      <div class="sb-tag">職安 × AI × 永續</div>
    </div>
  </div>
  <div class="sb-nav" id="nav"></div>
  <div class="sb-foot">© 2026 Oscar Hsiao</div>
</div>

<div id="readingProgress" style="display:none"><div class="fill"></div></div>
<main id="main"></main>

<script src="data.js"></script>
<script>
// ═══════════════════════════════════════════════
// Render（NAV / TOOLS / ARTICLES 資料定義在 data.js）
// ═══════════════════════════════════════════════
let currentSection='overview';
let currentArticle=null;

function goHome(){currentSection='overview';currentArticle=null;renderNav();renderMain();window.scrollTo(0,0);}

function shortLabel(label){
  const trimmed=label.replace(/^[\s　]+/,'');
  return trimmed.charAt(0)||'•';
}
function toggleSidebar(){
  document.body.classList.toggle('sidebar-collapsed');
  localStorage.setItem('sidebarCollapsed',document.body.classList.contains('sidebar-collapsed')?'1':'0');
}
if(localStorage.getItem('sidebarCollapsed')==='1')document.body.classList.add('sidebar-collapsed');

let expandedNav={articles:currentSection.startsWith('articles-'),tools:false};
function toggleNavGroup(id){
  expandedNav[id]=!expandedNav[id];
  renderNav();
}
function renderNav(){
  const el=document.getElementById('nav');
  el.innerHTML='';
  NAV.forEach(item=>{
    if(item.type==='link'){
      const btn=document.createElement('button');
      btn.className='sb-btn'+(currentSection===item.id?' active':'');
      btn.title=item.label;
      btn.innerHTML=`<span class="sb-icon">${item.icon}</span><span class="label-full">${item.label}</span>`;
      btn.onclick=()=>{currentSection=item.id;currentArticle=null;renderNav();renderMain();};
      el.appendChild(btn);
      return;
    }
    const isOpen=!!expandedNav[item.id];
    const head=document.createElement('button');
    head.className='sb-btn sb-acc-head'+(isOpen?' open':'');
    head.title=item.label;
    head.innerHTML=`<span class="sb-icon">${item.icon}</span><span class="label-full">${item.label}</span><span class="label-full sb-chevron">›</span>`;
    head.onclick=()=>{
      if(document.body.classList.contains('sidebar-collapsed')){toggleSidebar();expandedNav[item.id]=true;renderNav();return;}
      toggleNavGroup(item.id);
    };
    el.appendChild(head);
    const wrap=document.createElement('div');
    wrap.className='sb-acc-body'+(isOpen?' open':'');
    item.children.forEach(child=>{
      if(child.href){
        const a=document.createElement('a');
        a.className='sb-btn sb-sub';
        a.href=child.href;
        a.title=child.label;
        a.innerHTML=`<span class="label-full">${child.label}</span><span class="label-short">${shortLabel(child.label)}</span>`;
        wrap.appendChild(a);
      }else{
        const btn=document.createElement('button');
        btn.className='sb-btn sb-sub'+(currentSection===child.id?' active':'');
        btn.title=child.label;
        btn.innerHTML=`<span class="label-full">${child.label}</span><span class="label-short">${shortLabel(child.label)}</span>`;
        btn.onclick=()=>{currentSection=child.id;currentArticle=null;renderNav();renderMain();};
        wrap.appendChild(btn);
      }
    });
    el.appendChild(wrap);
  });
}

function toolCard(t){
  return`<a class="card${t.category==='esg'?' cat-esg':''}" href="${t.href}">
    <div class="tags">${t.tags.map(([label,cls])=>`<span class="${cls}">${label}</span>`).join('')}</div>
    <h3>${t.title}</h3>
    <p class="desc">${t.desc}</p>
    <div class="footer-row">
      <span class="status"><span class="dot"></span> 已上線</span>
      <span class="link">前往使用 →</span>
    </div>
  </a>`;
}

function readStats(a){
  const text=a.body.replace(/<[^>]*>/g,'');
  const words=text.replace(/\s+/g,'').length;
  const minutes=Math.max(1,Math.round(words/300));
  return{words,minutes};
}
function setupReadingProgress(){
  const bar=document.getElementById('readingProgress');
  bar.style.display='block';
  const fill=bar.querySelector('.fill');
  function update(){
    const max=document.documentElement.scrollHeight-window.innerHeight;
    const pct=max>0?Math.min(100,Math.max(0,(window.scrollY/max)*100)):0;
    fill.style.width=pct+'%';
  }
  window.removeEventListener('scroll',window._readingProgressHandler||(()=>{}));
  window._readingProgressHandler=update;
  window.addEventListener('scroll',update);
  update();
}
function hideReadingProgress(){
  const bar=document.getElementById('readingProgress');
  bar.style.display='none';
  window.removeEventListener('scroll',window._readingProgressHandler||(()=>{}));
}

function renderMain(){
  const main=document.getElementById('main');

  if(!(currentSection.startsWith('articles-')&&currentArticle)){
    hideReadingProgress();
  }

  if(currentSection==='overview'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag">作品集總覽</span>
        <h1>職安 × AI × 永續</h1>
        <p>整理目前完成的職業安全衛生與永續管理工具，結合資料自動化與法規規則引擎，協助企業以更有效率的方式管理日常職安衛與 ESG 事務。</p>
      </div>
      <div class="metric-grid">
        <div class="metric-card"><div class="metric-label">已上線工具</div><div class="metric-value">${TOOLS.length}</div><div class="metric-unit">項</div></div>
        <div class="metric-card"><div class="metric-label">職安衛工具</div><div class="metric-value">${TOOLS.filter(t=>t.category==='osh').length}</div><div class="metric-unit">項</div></div>
        <div class="metric-card"><div class="metric-label">ESG / 永續工具</div><div class="metric-value">${TOOLS.filter(t=>t.category==='esg').length}</div><div class="metric-unit">項</div></div>
        <div class="metric-card"><div class="metric-label">文章篇數</div><div class="metric-value">${ARTICLES.length}</div><div class="metric-unit">篇</div></div>
      </div>
      <div class="section-title">最新文章</div>
      <div class="article-list">${[...ARTICLES].sort((a,b)=>b.date.localeCompare(a.date)).map(articleCard).join('')}</div>
      <div class="section-title">工具導覽</div>
      <div class="grid">${TOOLS.map(toolCard).join('')}</div>`;
    bindArticleClicks();
    return;
  }

  if(currentSection==='osh'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag tag-blue">職業安全衛生</span>
        <h1>職業安全衛生工具</h1>
        <p>涵蓋法規管理、會議追蹤與教育訓練／證照管理，協助企業掌握法規異動、追蹤會議決議並自動規劃證照回訓。</p>
      </div>
      <div class="grid">${TOOLS.filter(t=>t.category==='osh').map(toolCard).join('')}</div>`;
    return;
  }

  if(currentSection==='esg'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag tag-green">永續 ／ ESG</span>
        <h1>永續 ／ ESG 工具</h1>
        <p>協助企業彙整溫室氣體排放數據，建立可追蹤的碳盤查資料庫，作為 ESG 報告與淨零規劃的基礎。</p>
      </div>
      <div class="grid">${TOOLS.filter(t=>t.category==='esg').map(toolCard).join('')}</div>`;
    return;
  }

  if(currentSection.startsWith('articles-')){
    const tag=currentSection.replace('articles-','');
    const navItem=NAV.flatMap(g=>g.children||[]).find(i=>i.id===currentSection);
    const filtered=ARTICLES.filter(a=>a.tags.includes(tag)).sort((a,b)=>b.date.localeCompare(a.date));
    if(currentArticle){
      const a=ARTICLES.find(x=>x.id===currentArticle);
      const rs=readStats(a);
      main.innerHTML=`
        <div class="article-detail active">
          <a class="back" onclick="backToArticles()">← 返回「${navItem?navItem.label:tag}」文章列表</a>
          <h1>${a.title}</h1>
          <div class="article-meta">${a.date}　${a.tags.map(t=>'#'+t).join(' ')}</div>
          <div class="read-stats"><span>📝 字數 ${rs.words}</span><span>⏱ 閱讀時間~${rs.minutes} 分鐘</span></div>
          <div class="body" style="margin-top:18px">${a.body}</div>
        </div>`;
      setupReadingProgress();
      return;
    }
    main.innerHTML=`
      <div class="hero">
        <span class="tag tag-yellow">文章專欄</span>
        <h1>${navItem?navItem.label:tag}</h1>
        <p>分享職安衛法規解讀、ESG 實務心得與 AI 應用於行政流程自動化的相關內容。</p>
      </div>
      ${filtered.length?`<div class="article-list">${filtered.map(articleCard).join('')}</div>`:'<div class="empty">此分類目前還沒有文章</div>'}`;
    bindArticleClicks();
    return;
  }

  if(currentSection==='about'){
    main.innerHTML=`
      <div class="hero">
        <span class="tag">關於</span>
        <h1>關於我</h1>
        <p>嗨，我是 Oscar。歡迎來到這裡。</p>
      </div>
      <div class="about-card">
        <img src="images/about-cover-godzilla.webp" alt="關於我：職安安全管理、流程自動化、ESG與碳管理" style="max-width:100%;border-radius:12px;display:block;margin:0 auto 6px">
        <div class="notion-asset-caption">職安安全管理、流程自動化、ESG與碳管理、持續學習</div>
        <p>這個網站主要記錄我在<strong>職業安全衛生、環境與永續資料整理、流程優化，以及 AI 工具應用</strong>上的學習、實作與整理。</p>
        <p>我一直對一件事很有興趣。那些原本很繁瑣、很依賴人工、很容易因為經驗差異而做法不一致的工作，有沒有可能被整理得更清楚一些？</p>
        <p>有沒有可能透過流程設計、數位工具，甚至 AI 的協助，讓事情變得更有效率、更穩定，也更容易交接與延續？</p>
        <p>這個網站，就是我一路摸索這些問題的過程記錄。</p>
        <p>如果你也對職安衛管理、ESG、行政流程優化、自動化工具有興趣，或正在思考怎麼把工作做得更系統化，這裡也許會對你有幫助。</p>

        <h3>我是誰</h3>
        <p>我是在補教業累積多年經驗後，於 2025 年轉職，開始走向職業安全衛生與 ESG 永續相關工作。</p>
        <p>進入這個領域之後，我很快就發現，很多流程仍然高度依賴紙本與人工整理。資料分散、表單繁多、紀錄方式不一致。平常看起來好像都能運作，但真正到了要追蹤、查找、統整或交接的時候，往往就會變得很凌亂。</p>
        <p>也因為這樣，我開始持續思考：這些制度和流程，有沒有可能被整理得更清楚一些？有沒有可能透過更好的結構、規則設計與數位工具，讓原本繁瑣的工作變得更穩定、更有效率，也更容易延續？</p>
        <p>所以我開始把這些工作拆解成可以被理解、被標準化、被優化的部分。有些透過表單整理，有些透過規則梳理，有些用前端小工具實作，也有些會嘗試結合 AI，來減少重複性的行政處理。</p>
        <p>我不是科班出身的工程師，也不是單純為了展示技術而做工具的人。比起做一個「看起來很厲害」的系統，我更在意的是：這個東西能不能真正解決問題。</p>

        <h3>為什麼寫這些</h3>
        <p>開始寫這些內容的原因，其實很單純。我在工作和學習的過程中，常常發現很多有價值的知識，不是不重要，而是寫得太硬、太散、太像給已經熟悉的人看的。</p>
        <p>但真正需要這些資訊的人，往往正卡在：不知道從哪開始，看了很多，還是不知道怎麼做。</p>
        <p>所以我想把自己整理過、實際做過、反覆驗證過的東西，用比較清楚、比較容易吸收的方式留下來。這裡的內容不會追求炫技，比較像是一份持續更新的工作筆記、工具筆記和實作筆記。如果剛好能幫到同樣在摸索的人，那就很值得。</p>

        <h3>這裡會寫些什麼</h3>
        <p>這個網站大致會記錄以下幾類內容：</p>
        <ul>
          <li>職業安全衛生管理相關整理與實務思考</li>
          <li>ESG／溫室氣體盤查／碳管理的資料整理方式</li>
          <li>AI 工具應用在行政與管理流程中的實際用法</li>
          <li>流程自動化與規則整理的實作筆記</li>
          <li>前端小工具開發的紀錄與想法</li>
          <li>一些關於數位化、制度落地、工作優化的觀察</li>
        </ul>
        <p>如果你也在關注這些主題，歡迎一起交流。</p>


        <h3>內容政策</h3>
        <p>本站文章以我個人的學習、工作整理與實作經驗為主。部分內容在整理與撰寫過程中，會使用 AI 工具協助架構發想、草稿整理或內容迭代；但文章中的觀點、判斷、整理方式與最終發布內容，仍以我本人確認後的版本為準。</p>
        <p>我希望這裡的內容，至少符合以下幾個原則：</p>
        <ul>
          <li><strong>親身驗證</strong>：只分享我實際用過、整理過，或親自測試過的方法與工具。</li>
          <li><strong>持續更新</strong>：技術、制度與工具都會變動，我會盡量定期回頭檢查舊文，必要時補充與更新內容。</li>
          <li><strong>錯誤修正</strong>：如果文章內容有明顯錯誤、過時資訊或引用不完整的地方，歡迎來信告知，我會在確認後盡快修正。</li>
          <li><strong>透明揭露</strong>：目前本站沒有任何付費合作、商業置入或聯盟行銷內容。若未來有相關合作，會在文章中清楚標示。</li>
        </ul>

        <h3>免責聲明</h3>
        <p>本站所有內容主要作為個人學習記錄、工作整理與經驗分享之用，不代表任何官方機構、主管機關或特定組織立場。另外，也補充幾點說明：</p>
        <ul>
          <li><strong>法規、制度與考試資訊</strong>：若文章中提及法規、制度、證照、訓練或相關規範，仍應以各主管機關、發證單位或官方公告為準。</li>
          <li><strong>AI 工具與數位服務</strong>：AI 工具、平台功能、收費方式與政策可能隨時調整，本站內容以文章發布或更新當時的資訊為準；如有疑義，請以官方文件或服務頁面為準。</li>
          <li><strong>方法與建議適用性</strong>：本站提到的流程、工具、整理方式與學習經驗，皆基於我個人的工作場景與使用經驗，不一定適用於所有人或所有組織。</li>
          <li><strong>讀者自行判斷使用</strong>：若您將本站內容應用於工作管理、制度建置、法遵判斷、教育訓練或系統導入，仍建議依自身需求與實際情境進一步評估。</li>
        </ul>

        <p style="margin-top:20px">如果你也正在摸索怎麼把工作做得更清楚、更有效率，希望這裡的一些內容，能讓你少繞一些路。我們一起慢慢把事情做好。</p>
        <p>有任何想聊的，歡迎來信：<a href="mailto:oscarhsiao1082@gmail.com">oscarhsiao1082@gmail.com</a></p>
      </div>`;
    return;
  }
}

function articleCard(a){
  const cover=a.cover||'';
  return`<div class="article-card" data-id="${a.id}">
    <div class="article-card-cover">${cover?`<img src="${cover}" alt="${esc(a.title)}" loading="lazy">`:''}</div>
    <div class="article-card-body">
      <div class="meta">${esc(a.tags[0]||'')}　•　${a.date}</div>
      <h3>${esc(a.title)}</h3>
      <p class="desc">${esc(a.excerpt)}</p>
      <div class="tags">${a.tags.map(t=>`<span>#${esc(t)}</span>`).join('')}</div>
      <span class="read-more">閱讀全文 →</span>
    </div>
  </div>`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function bindArticleClicks(){
  document.querySelectorAll('.article-card').forEach(el=>{
    el.onclick=()=>{
      const id=el.getAttribute('data-id');
      const a=ARTICLES.find(x=>x.id===id);
      if(!currentSection.startsWith('articles-')){
        const matchedTag=a.tags.find(t=>NAV.flatMap(g=>g.children||[]).some(i=>i.id==='articles-'+t));
        currentSection='articles-'+(matchedTag||a.tags[0]);
      }
      currentArticle=id;
      renderNav();renderMain();window.scrollTo(0,0);
    };
  });
}
function backToArticles(){currentArticle=null;renderMain();window.scrollTo(0,0);}

renderNav();
renderMain();
</script>
</body>
</html>
